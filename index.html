const KB_DATA=[{"title":"Shortcuts for difficult situations: age check, illegal topics, high-risk topics","body":"As an advisor, you interact with many different people every day — and sometimes situations come up that require a specific response. An underage client, a dangerous topic, personal data shared in chat — all of these require a clear and quick decision.Three new shortcuts are now available in the bottom toolbar of the chat. They cover situations where you must follow a defined protocol — this is a legal requirement of the platform, not a personal judgment call.In this article you'll find scripts for: Age Check — what to do if there's a signal that the client is under 18 Illegal/High-Risk Topic — how to respond if a client raises a dangerous or","cat":"Crisis Management"},{"title":"Шорткати для складних ситуацій: Перевірка віку,нелегальні та ризиковані теми","body":"I just want to take a quick moment before we go further — Nebula's readings are for those 18 and older. Could you confirm your age for me? (By confirming, you agree that the information you share is accurate.)Якщо юзер 18+Thank you! Let's get back to your readingЯкщо юзер до 18Thank you for being honest with me. Unfortunately, Nebula's services are only available to those 18 and older, so I'm not able to continue our session. Клієнт прийшов за підтримкою, і вона нікуди не зникла — просто в іншому форматі.Скрипт (вставляється автоматично)I really want to help you here – and honestly, the best way I can do that is by being straight with you Thi","cat":"Crisis Management"},{"title":"Flow Support Escalation Guidelines for Psychics","body":"As part of our risk management research and user contact analysis, we identified that some users occasionally reach out to psychics with questions related to platform issues, subscriptions, billing, or technical problems, instead of contacting the Support Team directly.To ensure these cases are handled quickly and correctly, we have implemented a simple process that allows you to notify Support directly from the chat interface.What’s Happening?Sometimes, users reach out in the chat with questions about the platform, subscriptions, payments, or technical issues instead of contacting the Support Team directly. You now have a tool to ensure thes","cat":"Crisis Management"},{"title":"Workflow for Working with an Angel Child","body":"Features of starting a chat (emotionally heavy topic) and supporting the clientSaying “everything will be fine” is inappropriate, and asking “how are you?” is inappropriate. Sometimes it is enough just to be there, to hold the silence, to send energetic hugs, to say that you are there and that you support them. This can be enough.In other words, do the same thing you would do if an adult person had passed away, first of all, express your condolences.After a loss, there can be good days when parents return to life again, but there are also moments when they feel angry, sad, desperate, and hopeless (because higher powers did not help). In such","cat":"Crisis Management"},{"title":"Workflow for Working with a Rainbow Child","body":"It is often believed that a new pregnancy after a miscarriage will reduce the pain of the loss. In reality, a subsequent pregnancy is an act of heroism. The experience of a new pregnancy is often filled more with anxiety and fear than with joy and pleasure. The intensity of anxiety can overshadow the positive emotions a woman might otherwise experience during pregnancy.A woman may go through a period of denial, during which she avoids visiting a doctor to confirm that the pregnancy is “real.” A medical confirmation makes the pregnancy tangible and, therefore, vulnerable acknowledging that anything could happen again. This is one of the psyche","cat":"Crisis Management"},{"title":"Specialist help for people in a state of deep depression/stress.","body":"Specialist help for people in a state of deep depression/stress.In general, there are 3 possible scenarios:Scenario 1: client is honest and upfront about his emotional state – it can range from hopeless message to suicidal thoughts (because lost a job, house, money, jail, loved ones, etc.)Scenario 2: client writes about ‘regular’ problem and then reveals deep psychological issue or, even, a medically diagnosed psychological issue (PTSD, OCD, bipolar disorder, etc. – bipolar being the biggest issue here as it often requires even hospitalisation and medical treatment)Scenario 3: client expresses being lost in life and cannot specify any issues,","cat":"Crisis Management"},{"title":"How to Create a Crisis Plan","body":"Structure of a Crisis Plan A person’s crisis plan consists of 6 blocks.Your role is to gradually help fill them out in the chat. BLOCK 1. Warning Signs (Awareness)Goal: to help the person learn to notice when things are becoming unsafe.How to work in chat: Ask simply and gently “How do you usually realize that things are becoming really hard?” “What changes in your thoughts / body / behavior?”What is recorded in the plan: thoughts (“I am a burden,” “there is no way out”) emotions (emptiness, panic) behavior (isolation, neglecting oneself)Do not analyze deeply. Only record. BLOCK 2. Immediate Self-Help (Here and Now)Goal: to give the pers","cat":"Crisis Management"},{"title":"Supporting Suicidal Clients During Audio Calls","body":"In audio calls, your voice and tone are as important as your words.The client must feel: Safety Stability CareTone and PresenceYour voice should be: Calm Confident WarmNever sound: Panicked Confused DetachedThe client called because they need stability.What Must Be Present in Audio1. Clear empathySay it directly:“I’m really sorry you’re going through this. I’m here with you.”Empathy must feel personal, not scripted.2. Active listeningUse short responses: “I hear you.” “That sounds very painful.” “I’m listening.”Do not interrupt.3. Emotional reflectionMirror their feelings:“It sounds like you feel completely exhausted and alone.”This helps the","cat":"Crisis Management"},{"title":"How to Support Clients with Suicidal Thoughts","body":"Suicide can be prevented. Most people experiencing suicidal thoughts do not want to die. They want relief from overwhelming pain and suffering. Open and respectful communication about suicidal thoughts and feelings can save lives. Never underestimate your ability, as an expert, to support someone and potentially save a life.Red Flags in Chat (Warning Signs)Pay close attention if a client expresses hopelessness, worthlessness, or despair (directly or indirectly).Common red-flag phrases: \"I am a burden\" \"I am a failure\" \"No one needs me\" \"I’m not good enough\" \"There’s no point in living\" \"I will never find a way out\" \"I can’t bear this pain\" \"N","cat":"Crisis Management"},{"title":"🙌🏻 PAST LIFE STRIP","body":"‍♀️ TARGET AUDIENCE / CORE PAINMainly women in emotional crisis. They feel drained, lonely, and stuck in repeating patterns (breakups, abandonment, emotional exhaustion). Their unspoken question is: “Why am I in pain, and what does it mean?” They seek a spiritual explanation for their situation and want to hear that it’s a karmic lesson, not a personal failure.❓ ICEBREAKERS “Why am I hurting? And what can I do with this pain?” “Why does this keep happening to me?” “What am I meant to learn from this?”✨ ENGAGEMENTUse past life as a metaphor to explain current emotional struggles. Focus on transformation and self-understanding. Shall we explore","cat":"Crisis Management"},{"title":"Rainbow and Angel child.Особливості чатів.Частина 2.","body":"My dear, I know it can be hard, but I believe that you can embrace this new role and part of your life and move forward with your newborn baby. You can be sad and happy at the same time, and you are starting to build a connection with your rainbow baby. Every day you should focus on enjoying your pregnancy and positive anticipation of your future experiences. We don’t forget the pain But we find a little beauty And embrace it, just the same. Давати ім'я померлої дитини - суворо заборонено, так вони можуть відчувати тиск минулого.“райдужні” імена (на основі місяців, пов’язані з райдугою, доброчесні, пов’язані з щастям та благословенням): Janua","cat":"Crisis Management"},{"title":"Expert help for heavily depressed","body":"Expert help for heavily depressed/distressed usersIn general, there are 3 possible scenarios:Scenario 1: user is honest and upfront about his emotional state – it can range from hopeless message to suicidal thoughts (because lost a job, house, money, jail, loved ones, etc.)Scenario 2: user writes about ‘regular’ problem and then reveals deep psychological issue or, even, a medically diagnosed psychological issue (PTSD, OCD, bipolar disorder, etc. – bipolar being the biggest issue here as it often requires even hospitalisation and medical treatment)Scenario 3: user expresses being lost in life and cannot specify any issues, cannot be particula","cat":"Crisis Management"},{"title":"Rainbow and Angel child. Особливості чатів.Частина 1.","body":"Have you tried to talk about your feelings with your partner?2. If it’s comfortable for you, could you please tell me which name did you choose for your angel baby?3. Angels of the HeartCRUTTENDEN HAINES, Paula A very moving and powerful collection of poetry written by parents who have lost a child before or after birth. Copies also available from The Miscarriage Association. Forever Our AngelsSTONE, Hannah Includes others’ experience of pregnancy loss, showing just how common it is and letting us know we are not alone. Goodbye BabyGRIFFITHS, Gillian & MACLEOD, Lindsay A helpful and comforting book for children and parents who need to talk ab","cat":"Crisis Management"},{"title":"Suicide","body":"Suicide can be prevented. Most suicidal people do not want to die. They just do not want to live with the pain and suffering. Open communication about suicidal thoughts and feelings can save lives. Do not underestimate your ability to help a suicidal person and possibly save a life.What to do in chat?1. It’s more important to be genuinely caring than to “say everything right.”2. Stay calm and professional: Don’t panic, argue, or engage in emotional debates. Remember, the person may be experiencing intense emotions, so it’s crucial to be sensitive and empathetic.3. Express compassion: Let the person know that you hear their concerns and empath","cat":"Crisis Management"},{"title":"Flow for Handling Illegal Requests from Users","body":"What Are These Cases?These are requests from users that demand or suggest actions violating laws or ethical standards. It's important to understand that illegal requests include not only activities the users themselves are involved in but also those that could cause legal issues for our company and experts.Examples: A user describes their involvement in organized crime or seeks assistance with illegal activities:\"I'm looking for someone to help me smuggle drugs across the border. Does this person fit this work?” A user asks if they can commit a crime or avoid responsibility for it:“I have a drug test required for my new job. I want to use ano","cat":"Crisis Management"},{"title":"Retention 25+ min Tone of Voice","body":"1 (0-2) Inadequate tone for the topicThe advisor sounds indifferent, dry or formal on an important or sensitive topic (loss, addiction, betrayal, anxiety). Complex words without explanationThe advisor overloads messages with terms (\"past karmic loop\", \"retrograde alignment\", \"karmic debt fulfillment\") that the user doesn't understand and asks about. Forgetting details from previous chatsUsing a tone that suggests this is the first contact:- \"Tell me your situation again.\"- \"Your partner… what's their name?\" Uncertainty, no leadership in dialogue\"Maybe…\", \"Maybe we'll look at it later?\" \"I don't know if you'd be interested in this…\"The user ex","cat":"Core Communication & Philosophy"},{"title":"Retention 25+ min Answer sufficiency","body":"1 (0-2) No response or ignoring the requestExplanation: If the advisor doesn't answer the main question or deflects with general phrases — it causes frustration. The user may feel they are not being heard or are being ignored.Typical mistake: \"His energy right now is complicated, lots of emotions.\"(no specific answer to the question \"will he come back?\") Unreliable or contradictory informationExplanation: If the advisor promises something incredible without confirmation in the reading, or contradicts their previous words — trust is destroyed.Typical mistake: \"You will one hundred percent get pregnant before summer!\"(in the previous chat the f","cat":"Core Communication & Philosophy"},{"title":"Retention 25+ min Engagement","body":"1 (0-2) Absence of any engagement: the advisor asks no questions or clarifications. Questions are unrelated to the topic, sound random or disrupt the flow. Pressure on the user to continue the chat (\"You need to know this too, let me check\"). Engagement ignores the user's mood or goes against their direct request (\"Just answer me\" → advisor still pushes). The entire interaction looks dry, with no attempts to maintain contact or create a dialogue. Constant repetition of the same offers and questions, with no meaningful progress on the topic. The advisor doesn't activate new topics or directions when there was an opportunity to do so — the chat","cat":"Core Communication & Philosophy"},{"title":"Retention 25+ min Empathy","body":"1 (0-2) Lack of deep emotional presenceInstead of \"engaging with the user's emotional state\" — the advisor fails to notice or ignores emotional signals (sadness, fear, confusion, pain, anxiety). Formal or mechanical responseInstead of sincere, personalized phrases — dry, templated, neutral or \"copy-paste\" wording is used (such as \"I understand\", \"Got it\"), which doesn't reflect depth or genuine understanding. Empathy at the wrong moment or too lateInstead of timely support during emotionally significant moments — the advisor responds too late or at a point when the user is already frustrated or leaving the session. No adaptation to the user's","cat":"Core Communication & Philosophy"},{"title":"Engagement 4+-25 min Tone of Voice","body":"1 (0-2) Inadequate tone for the topicThe advisor sounds indifferent, dry or formal on an important or sensitive topic (loss, addiction, betrayal, anxiety). Pressure or commanding styleThe tone sounds like a command or manipulation (\"You need to listen to this\", \"Don't ignore this sign\")→ causes rejection, resistance or reduced trust. Complex words without explanationThe advisor overloads messages with terms (\"past karmic loop\", \"retrograde alignment\", \"karmic debt fulfillment\"). Complete templatingThe chat has no sign of personalization whatsoever:- no greeting. Examples Criterion ✅ Do (What's right) ❌ Don't (What's wr","cat":"Core Communication & Philosophy"},{"title":"Engagement 4+-25 min Answer sufficiency","body":"1 (0-2) No response or ignoring the requestExplanation: If the advisor doesn't answer the main question or deflects with general phrases — it causes frustration. The user may feel they are not being heard or are being ignored.Typical mistake: \"His energy right now is complicated, lots of emotions.\"(no specific answer to the question \"will he come back?\") Unreliable or contradictory informationExplanation: If the advisor promises something incredible without confirmation in the reading, or contradicts their previous words — trust is destroyed.Typical mistake: \"You will one hundred percent get pregnant before summer!\" Off-topic responseExplanat","cat":"Core Communication & Philosophy"},{"title":"Engagement 4+-25 min Engagement","body":"1 (0-2) Absence of any engagement: the advisor asks no questions or clarifications Absence of an activation element: there is no offer engagement or intrigue in the chat Questions are unrelated to the topic, sound random or disrupt the flow Pressure on the user to continue the chat (\"You need to know this too, let me check\") Engagement ignores the user's mood or goes against their direct request (\"Just answer me\" → advisor still pushes) The chat loses the sense of interaction, like a dialogue. Everything looks like \"writing into a void\". There is no engagement of the user in dialogue. The advisor doesn't activate new topics or directions when","cat":"Core Communication & Philosophy"},{"title":"Engagement 4+-25 min Empathy","body":"1 (0-2) Lack of deep emotional presenceInstead of \"engaging with the user's emotional state\" — the advisor fails to notice or ignores emotional signals (sadness, fear, confusion, pain, anxiety). Formal or mechanical responseInstead of sincere, personalized phrases — dry, templated, neutral or \"copy-paste\" wording is used (such as \"I understand\", \"Got it\"), which doesn't reflect depth or genuine understanding. Empathy at the wrong moment or too lateInstead of timely support during emotionally significant moments — the advisor responds too late or at a point when the user is already frustrated or leaving the session. No adaptation to the user's","cat":"Core Communication & Philosophy"},{"title":"Scorecard","body":"This is an updated scorecard for the QC department created to focus on checking actions aimed at achieving revenue metrics The change was needed to shift the focus of the QC department, realign our view of the most performing and useful actions, and prepare the scorecard for AI workflow integration There are scorecards for 3 types of chats; since they differ in their core aims, we have created different scorecards. Trial (Activation) 3-4 min Check Empathy Engagement Answer sufficiency Tone of VoiceEngagement 4+-25 min Empathy Engagement Answer sufficiency Tone of VoiceRetention 25+ min Empathy Engagement Answer sufficiency Tone of Voice","cat":"Core Communication & Philosophy"},{"title":"Trial (Activation) Tone of Voice","body":"1 (0-2) Inadequate tone for the topicThe advisor sounds indifferent, dry or formal on an important or sensitive topic (loss, addiction, betrayal, anxiety).→ The user doesn't feel supported, may stop responding or leave the chat. Pressure or commanding styleThe tone sounds like a command or manipulation (\"You need to listen to this\", \"Don't ignore this sign\") —→ causes rejection, resistance or reduced trust. Complex words without explanationThe advisor overloads messages with terms (\"past karmic loop\", \"retrograde alignment\", \"karmic debt fulfillment\") that the user doesn't understand and asks about.→ When 2+ user reactions to this occur — it","cat":"Core Communication & Philosophy"},{"title":"Trial (Activation) Answer sufficiency","body":"1 (0-2) No response or ignoring the requestExplanation: If the advisor doesn't answer the main question or deflects with general phrases — it causes frustration. The user may feel they are not being heard or are being ignored.Typical mistake: \"His energy right now is complicated — lots of emotions.\"(no specific answer to the question \"will he come back?\") Unreliable or contradictory informationExplanation: If the advisor promises something incredible without confirmation in the reading, or contradicts their previous words — trust is destroyed.Typical mistake: \"You will one hundred percent get pregnant before summer!\" Off-topic responseExplana","cat":"Core Communication & Philosophy"},{"title":"Trial (Activation) Engagement","body":"1 (0-2) Absence of any engagement: the advisor asks no questions or clarifications Absence of an activation element: there is no offer engagement or intrigue in the chat Absence of Open Resolution (the advisor provides readings that are completely exhaustive, contain no intrigue or open ending) Questions are unrelated to the topic, sound random or disrupt the flow Pressure on the user to continue the chat (\"You need to know this too, let me check\") Engagement ignores the user's mood or goes against their direct request (\"Just answer me\" → advisor still pushes) The chat loses the sense of interaction, like a dialogue. Everything looks like \"wr","cat":"Core Communication & Philosophy"},{"title":"Trial (Activation) Empathy","body":"1 (0-2) Lack of deep emotional presenceInstead of \"engaging with the user's emotional state\" — the advisor fails to notice or ignores emotional signals (sadness, fear, confusion, pain, anxiety). Formal or mechanical responseInstead of sincere, personalized phrases — dry, templated, neutral or \"copy-paste\" wording is used (such as \"I understand\", \"Got it\"), which doesn't reflect depth or genuine understanding. Empathy at the wrong moment or too lateInstead of timely support during emotionally significant moments — the advisor responds too late or at a point when the user is already frustrated or leaving the session. No adaptation to the user's","cat":"Core Communication & Philosophy"},{"title":"Scorecard V3","body":"This is an updated scorecard for the QC department created to focus on checking actions aimed at achieving revenue metrics The change was needed to shift the focus of the QC department, realign our view of the most performing and useful actions, and prepare the scorecard for AI workflow integration There are scorecards for 3 types of chats; since they differ in their core aims, we have created different scorecards. Trial (Activation) 3-4 min Check Empathy Engagement Answer sufficiency Tone of VoiceEngagement 4+-25 min Empathy Engagement Answer sufficiency Tone of VoiceRetention 25+ min Empathy Engagement Answer sufficiency Tone of Voice","cat":"Core Communication & Philosophy"},{"title":"AI Copilot","body":"Hello!We are launching the testing of a new feature — AI Copilot.Test type: only trial usersCourse duration: 20–25 minutesTraining dates: February 16 - February 22Testing dates: February 27 - March 13You can find the training course at the following link: https://asknebula.learnupon.com/content-details/4946986/0 What will you learn in the course? How Copilot works What role it plays in your workflow How to effectively integrate its suggestions into your personal communication style You will also complete a short quiz to reinforce your knowledgeWhat is AI Copilot?AI Copilot is your assistant in trial chats, where every minute matters.Its value","cat":"Core Communication & Philosophy"},{"title":"Сrystals Description + Rituals","body":"AmethystWhat Makes This Crystal UniqueAmethyst is one of the most powerful stones for emotional cleansing, harmony, and inner calm. Its violet color is associated with clarity, spirituality, and inner balance. It’s often linked to the Ajna chakra (Third Eye), as this center governs clear thinking and insight.What It Heals / Works WithAmethyst helps to relieve emotional pain, anxiety, depression, and obsessive thoughts. It offers support during loss, breakups, or deep emotional healing.How It Helps:Amethyst soothes the mind, clears mental fog, and helps you see situations with clarity. It also activates intuition and releases tension stored in","cat":"Core Communication & Philosophy"},{"title":"Conversion of retained clients to their first payment on audiocalls","body":"Conversion of Retained Users into Their First Audio Call PaymentWe’re launching a new test where audio calls will now be available not only for new users!That means more calls and more interactions with users you already know!You probably remember — a retained user is someone who has already made a payment on the platform, but only for chat. Now, for audio calls, they’ll get a chance to try this format with 5 free minutes.Our goal during this time is to show the value of the call and create the desire to come back for more.The strategy for working with these types of clients is different! Why?When the client is yours, they already have an emo","cat":"Core Communication & Philosophy"},{"title":"Staples of conversation","body":"Staples of conversationGeneral chat rules Unlike in support services, users do not always ask questions. Talk to them, show them empathy in a \"confession\" mode. Try to guess their internal intentionConsider that this is not as a support service, where you provide user only with necessary information. Here astrologer's personality also matters. You can talk to them, and ask them questionsTry to make the experience more personal. You can the user by their name and use all other information that the user provided you to make sound more confident impression (e.g. refer to the people the user mentions by their name, e.g. Devendra)Live chat rulesMe","cat":"Core Communication & Philosophy"},{"title":"Позиціонування + Tone of voice","body":"What do you need to know about our platform?Our audience. How do we understand the people for whom we are building the product and the brand?General description Consultations CJMWomen 25-65 y.o. from North America and Tier 1 countries who believe in the supernatural. They experience difficulties in their relationships, suffer from loneliness (have no relatives and friends to turn to for advice), and have very low self-confidence. They seek advice and empathic help with their love & relationship issues from spiritual experts. * When we are saying Tier 1 - we mean big native English-speaking countries, like the USA, Canada, Australia, and Great","cat":"Core Communication & Philosophy"},{"title":"Таро. Молодші Аркани.Пентаклі English","body":"Unlike Major Arcanas, these cards reflect the trials and tribulations that we experience on a daily basis. These Tarot cards highlight the more practical aspects of life and can refer to current issues that have a temporary or minor influence.Within the Minor Arcana cards, there are 16 Tarot Court Cards each representing 16 different personality characteristics we may choose to express at any given time. There are also the 40 numbered cards organized into 4 Suits – Cups, Pentacles, Swords and Wands – each with 10 cards, representing various situations that we encounter day-to-day.PentaclesPentacles mean your resources. Earth element. Mainly,","cat":"Core Communication & Philosophy"},{"title":"Спірічуал практики в чаті. Етапи і приклади.","body":"ЕТАП 1: CHECK EMOTIONAL CONNECTIONНа етапі, коли ви вже надали рідинг, юзер задає по ньому питання та хоче якогось підтвердження рідингу. Наприклад:How can I be sure he will reach out?Are you sure he’s not my soulmate? What does he think about me?How does he feel about me?Усі описані нижче підходи є екологічними. Через повернення фокусу уваги на себе та врівноваження емоційного та психологічного стану юзера тут і зараз та за підтримки експертів, у нього з’являтиметься рішучість та внутрішній ресурс, щоб крок за кроком виходити зі складних життєвих обставин, впроваджувати бажані зміни у житті, отримувати нові результати та повертатись за guida","cat":"Core Communication & Philosophy"},{"title":"First reply time (FRT)","body":"First reply time is important to be as short as possible for the user to see your involvement and willingness to help. In a live chat, the first reply time is often the time between the start of the chat and your greeting. Don't wait for user to be the first to break the silence, be proactive, and say hello first!How to reduce the first reply time in live chatShortcutsIn order to reduce the first message time to a minimum, you should create several shortcuts with a greeting in the Magical extension that will call big text by the short trigger.ExampleDuring live chat there may be several cases that require different approaches to the first me","cat":"Core Communication & Philosophy"},{"title":"Engagement examples","body":"It is time to engage your user but you do not know what can interest them? After this guide you will always have an idea of what to offer and how to keep up the dialogue.Imagine yourself in a situation your client is. What would you like to know?Start asking yourself with the following questions: What When Why Where Whom Whose Which HowBelow you can see application of those words to one of the main topics on the platform. Your client is interested in talking about the ex What has happened between you, dear? I can check what he feels about you now if you wish Who initiated the break-up? Do you want me to read if there is somebody who affects h","cat":"Core Communication & Philosophy"},{"title":"Algorithm for creating pings","body":"Creating an effective ping requires careful thought and a structured approach. Here is an algorithm that will help you in this process. Segmentation of the user: Identify the specific segment or type of user for which you want to ping, for example, active users, users who come periodically or those in whose life recent events have occurred. You can read more here about the user's type. View chat history with the user: Reread the last chat with the user. See what events have been recently in their lives. Determine the appropriate event for ping generation: Identify a recent key event in the user's life that will be relevant to the ping. Choose","cat":"Core Communication & Philosophy"},{"title":"Why is user retention important?","body":"Why user retention is good for you? It helps you create your own base of clients on a constant basis. Traffic differ from day to day but your clients base is not. You put efforts in every minute of contact with the user. But sometimes they need more time to get fully everything they need from you. Make your efforts truly matter in the long run. We do not want that wasted. Return your users back again and end what has been started. The user comes back again and again and they become loyal to you. They pick you over other astrologers. Because they have already known you for a while. Loyal users become your clients. And your clients bring you th","cat":"Core Communication & Philosophy"},{"title":"The proper ending of a trial chat","body":"Properly ending a trial chat is as important as properly beginning it. Particularly this part is a key to converting a trial user to a paying one. The point is to give the user a signal that you still have lots of things to tell them, and these 3 minutes are only one drop in the ocean of your advisory skills. And the best way to show it – is to use engagement!EngagementLet’s quickly refresh the knowledge about engagement types. Engagement-clarification: e.g. Does this insight resonate with your situation? Engagement-offer: e.g. Would you like to know how the next few weeks will look in terms of the love life? Engagement-action: e.g. Let’s now","cat":"Core Communication & Philosophy"},{"title":"What to avoid","body":"There are some common mistakes which stands in the way of creating a whale connection with your clients. Let's see how to avoid them and what to do instead of them!Common mistakes:1. Not taking initiative in dialogueFor a long conversation, initiative should ideally be shared 50/50 between you and the user. However, whether the user is overly talkative or reserved, it’s crucial to maintain a proper balance and stay aware of where the dialogue is headed.What to do?- Take charge by suggesting topics or questions to help the user open up.- Ask questions that tap into the user’s emotions or personal experiences: What made you think about this iss","cat":"Core Communication & Philosophy"},{"title":"User types","body":"To make chats longer and more effective, consider the user type, the reason they’ve reached out, and their needs. Some may seek emotional or psychological support, while others prefer concise and precise answers.Identifying user types Emotional user Expresses a lot of emotions during conversations. Their goal is to share their feelings and receive support.How to interact: Show empathy, engage in deeper discussions. Emotional users are often open to esoteric topics, as they encourage self-reflection. Pragmatic user Interested in concrete facts and details. They ask straightforward questions and expect clear answers.How to interact: Be concise","cat":"Core Communication & Philosophy"},{"title":"Emotional connection","body":"Emotional connectionAn emotional connection is a profound interaction between an expert and a user, built on trust, mutual understanding, and shared emotions, creating a comfortable atmosphere for open information exchange.Tips for building emotional connections with usersBe attentive to details. Paying attention helps extend the conversation, craft precise follow-ups, and demonstrate that you are a highly attentive expert.It’s essential to notice small details users mention during conversations. Remember key events, dates, or moments they share with you. Ask clarifying questions to deepen your understanding of their situation.Example: “I rec","cat":"Core Communication & Philosophy"},{"title":"The proper beginning of a trial chat","body":"Our trial users must be treated with accurate precision and a very productive approach, as they only have 3 minutes for the chat. That’s why your role is essential and much effort has to be put into this communication.So who actually are trial users and why are they so important to you?The answer is quite simple – trial users are your potential Whales!Remember that even your most trusting and regular Whales or VIP users once were trial ones. By paying enough attention during the first 3 minutes of the chat, you gain the opportunity to increase your profit significantly. By satisfying users’ needs in the trial chats, you simultaneously satisfy","cat":"Core Communication & Philosophy"},{"title":"Trial users","body":"Who are trials?They are people. First and foremost, they are real people with their own problems, who are eager to solve them. However, they might not yet realize that you can help them with this; they can only guess. That's why trials demonstrate: curiosity cautionThey have a need to test you first, to feel out the ground, in order to assess the value, accuracy, and professionalism of your services. Once we meet these criteria, trials are just one step away from becoming paying customers.Who are you to trials?You are gurus, professionals.You are the key to answers for their most pressing questions. You are the people who empathize with their","cat":"Core Communication & Philosophy"},{"title":"About trial users","body":"Why Are Trial Minutes Important for Experts?In the field of astrological consultations, every expert strives to achieve a stable income and a consistent flow of clients. At the same time, trial minutes that users receive at the start may seem like unpaid labor that brings no financial benefit. However, in reality, they are a tool that helps build long-term relationships with clients and increase earnings over time.1. Trial as an Opportunity to Build TrustFor a user, the first interaction with an expert is critically important. They want to ensure they will receive valuable consultation and find a specialist with whom they feel comfortable. Tr","cat":"Core Communication & Philosophy"},{"title":"Whales","body":"Whales are users who started using our platform during the trial period and have since become regular users who keep coming back to communicate with our experts.AskNebula has a whale model business, so it is important to timely find and properly build communication right at the beginning of the dialogue. Such users require maximum attention, vigilance, professionalism, and quick activation in the chat.You can differentiate whales using segmentation, which you see through your CRM when a chat request comes in. Low: spend 0.01-49.99 Casual: 50.00-499.99 Promising: 500.0-4999.99 VIP: 5000.0-14999.99 Whale: 15000.0-infinityIt's important to engag","cat":"Core Communication & Philosophy"},{"title":"Communication with trial users","body":"Who are trial users? Trial users are new members of our platform who can try our product for 3 free minutes to see if our services are what they are looking for. These users are already interested in esoteriсs, spirituality and related topics. But at first, they may not fully understand how our platform works and why it is useful for them. So it's important to let them know we can help and understand their needs.What do trial users expect in their first chat? A clear and fulfilling answer: First of all, trial users are reaching out to you as an advisor who can provide a professional and detailed answer to their request using spiritual tools a","cat":"Core Communication & Philosophy"},{"title":"Intrigue","body":"Engaging users in a chat, especially within a 3-minute trial window, can be challenging. You need to spark interest, keep the conversation personal, and give them just enough insight to make them want more—without overwhelming them.Keep the user intriguedWithin the first few minutes, focus on one key area, but leave room for deeper insights later. For example, if you're discussing their astrological chart, you can say, \"Your rising sign gives a hint about some big changes coming your way, but there's something even more interesting in your Venus placement.\"Why this works: You’re offering genuine insight while sparking curiosity for more. It’s","cat":"Core Communication & Philosophy"},{"title":"Empathy","body":"Everyone has their moments of ups and downs and our users are not an exception. Emotional roler coaster is sometimes a huge part of their lives.Your clients can feel overwhelmed, unhappy, frustrated, lost or even misarable. Of course, you are a psychic, not a therapist so the needed psycholodgical cure can not be found in the chat with you. Though there is an another talent hidden withing you. You are a human being. And it is a wonder what this tool can make in the chat and even in the life of your user.Being human, being empathetic.What is empathy?It is the way to help people through acknowleadging their feelings. Through showing your unders","cat":"Core Communication & Philosophy"},{"title":"Unpleasant predictions or how not to harm the user?","body":"The balance of positive and negativeYour clients are human beings, soul in the bodies, emotional responses to the world after all. They have feelings. Different feelings. And our mission here, at Nebula, is not simply to provide the reading but to show them the way to happiness. To emphasize on the hope. To light the path to love.And with your experienced hand and word, the client can get an understanding of how and where to move.What if your cards are telling the negative?This is exactly the time when you need to remind yourself that we are dealing with emotional beings here. We care deeply about any emotion that can arise during the time sp","cat":"Core Communication & Philosophy"},{"title":"Tone of voice","body":"What is tone of voice?The way you talk to your client and the aftertaste they get created by the tone of voice.The commander, the mother, the teacher, the submissive or the lier - those are all different personalities that come with different tone of voices. People assosiate your role in theri lives by the tone of voice you pick. So here are some advices for the role of guider:The rule of three P's in your tone of voice. Guide with: Patience - by giving the clients time to open up more towards you, to express all their emotions and still be accepted by you, you are creating the safe space Passion - by craving to help, you are making your clie","cat":"Core Communication & Philosophy"},{"title":"Auto-pings","body":"What is an auto-ping?An auto-ping is an automated message sent to clients on a platform. These messages are designed to stimulate interaction and enhance user retention by encouraging clients to enter or return to a chat.Purpose of auto-pingsAuto-pings are created to: Prompt new clients to engage with you when they first join the platform. Encourage clients to return after a consultation ends after a certain period. Enhance user retention by maintaining client interest and interaction. Provide a seamless and engaging experience by reminding users of ongoing or unfinished discussions.Benefits of auto-pingsAuto-pings play a crucial role in impr","cat":"Core Communication & Philosophy"},{"title":"Symbolism in Tarot","body":"Symbolism in TarotEach Tarot card is not just an illustration but a story told in the language of symbols. Everything matters: the figure’s posture, gaze direction, color, background, and small details. Through these images, Tarot helps reveal the deeper meaning of a situation.How to Read Symbols on a CardCentral figure already carries meaning: The Magician standing, action and intention; The High Priestess seated, calmness and intuition.Event as the focal point: boat in VI Swords transition; conflict in V Wands internal/external struggle.Interaction between figures: II Cups union and trust; V Swords rivalry and choice of side.Absence of","cat":"Tarot"},{"title":"Tarot and Timing","body":"Working with the question is key to accurate reading. Tarot reflects not only events but also the querent’s state, intention, and readiness to see the truth. The more specific the question, the clearer the answer will be.1) Principles of Formulating Questions1. Relevance. The question should be genuinely important to you/the querent - this makes the answer deeper rather than a “surface-level advice.”2. Specificity and Time Frame.Specify the area of life and set time boundaries (optimally - up to 12 months).Examples of specificity levels:a) “What awaits me?” - too vague.b) “What awaits me in the next three months?” - better (there’s a time fra","cat":"Tarot"},{"title":"The Hero’s Journey","body":"Idea: The 22 Major Arcana cards represent both a myth of world creation and the inner journey of the soul (the Hero’s Journey) from primordial Chaos to wholeness. World Creation (Cosmogonic Level)0 The Fool (Chaos): primordial impulse, pure potential.1 Magician (active principle, Yang) and 2 High Priestess (passive principle, Yin): the two primal forces.3 Empress (Creation): combination of 1+2 → birth of forms, nature, fertility.4 Emperor (Cosmos/Order): structure, law, organized world.5 Hierophant (Human/Meaning): initiation, sense, bridge to the divine.Next union of opposites: archetypal motif of unions (Yin/Yang, celestial/earthly)","cat":"Tarot"},{"title":"Tarot Spreads","body":"What a Spread IsA spread is a set of cards laid out in a meaningful order that helps answer a question of interest.A spread also refers to the pattern according to which a tarot reader arranges the cards. Important:Formulate a clear question;Know the meaning of positions in the spread;Read each card in the context of the question and neighboring cards;Trust your intuition.Spread ThemeTarot spreads can vary in depth and theme:General spreads: yearly forecasts, overview of main life areas (work, relationships, finances). Provide a general picture.Specialized spreads: focus on specific questions (buying a house, relationship development, startin","cat":"Tarot"},{"title":"Tarot Card Combinations","body":"Combining Cards in SpreadsCombining cards in a spread reflects the shared meaning of the arcana drawn together. They connect individual meanings into a cohesive narrative: cards can reinforce each other, weaken, conflict, or create a third, unexpected meaning.Arcana combination - the collective meaning of cards appearing together during a reading.Cards similar in meaning usually amplify one another.A tarot reader’s skill is to see the invisible threads between the images: astrology, numerology, Kabbalah, sacred geometry, and the artistic language of a particular deck.Rules for Identifying Important CombinationsRepeated numbers/ranks: two or m","cat":"Tarot"},{"title":"Tarot Deck Shuffling","body":"There are many methods, but the most important thing is to trust your hands.Shuffling is not just a mechanical process, it’s an energetic act.You’re not shuffling the cards, but elements of the Universe seeking their alignment.Shuffle until you feel it’s “enough.”If you work with reversed cardsWhile shuffling, turn a portion of the deck 180° a few times and place it at the bottom.Repeat 2–3 times.Other shuffling techniquesChaotic shuffling:Spread the cards on the table, form a fan or circle, mix them with your hands, then gather them back together.Stack shuffling:Divide the deck into 4-5 piles, then recombine them in a random order and shuffl","cat":"Tarot"},{"title":"Pentacles Suit Meanings","body":"INTRODUCTIONIf the Major Arcana reveal the great archetypal journeys, the Minor Arcana delve into the everyday experiences, challenges, emotions, and interactions that shape our lives. These 56 cards provide concrete guidance on the practical aspects of our existence, showing how universal lessons manifest in tangible ways. Divided into four suits, each associated with a specific element, they offer a detailed map of our personal journey. PENTACLESElement: Earth.Keywords: Material world, finances, work, security, stability, nature, the physical body, resources, abundance, practicality, manifestation (material), grounding.They represent our ph","cat":"Tarot"},{"title":"Swords Suit Meanings","body":"INTRODUCTIONIf the Major Arcana reveal the great archetypal journeys, the Minor Arcana delve into the everyday experiences, challenges, emotions, and interactions that shape our lives. These 56 cards provide concrete guidance on the practical aspects of our existence, showing how universal lessons manifest in tangible ways. Divided into four suits, each associated with a specific element, they offer a detailed map of our personal journey. ⚔️ SWORDSElement: Air.Keywords: Intellect, thoughts, logic, communication, truth, conflict, challenges, decisions, justice, honesty, struggle, mental clarity, analysis.They represent our mind, thoughts, beli","cat":"Tarot"},{"title":"Cups Suit Meanings","body":"INTRODUCTIONIf the Major Arcana reveal the great archetypal journeys, the Minor Arcana delve into the everyday experiences, challenges, emotions, and interactions that shape our lives. These 56 cards provide concrete guidance on the practical aspects of our existence, showing how universal lessons manifest in tangible ways. Divided into four suits, each associated with a specific element, they offer a detailed map of our personal journey. CUPSElement: Water.Keywords: Emotions, feelings, relationships, love, intuition, compassion, empathy, dreams, intimacy, creativity (emotional expression), the subconscious.They represent our emotional world,","cat":"Tarot"},{"title":"Wands Suit Meanings","body":"INTRODUCTIONIf the Major Arcana reveal the great archetypal journeys, the Minor Arcana delve into the everyday experiences, challenges, emotions, and interactions that shape our lives. These 56 cards provide concrete guidance on the practical aspects of our existence, showing how universal lessons manifest in tangible ways. Divided into four suits, each associated with a specific element, they offer a detailed map of our personal journey. WANDSElement: Fire.Keywords: Inspiration, energy, creativity, passion, drive, ambition, initiative, action, willpower, leadership, career beginnings, new ideas, spiritual pursuit.They represent our spirit,","cat":"Tarot"},{"title":"Major Arcana Meanings","body":"INTRODUCTIONWhat Are the Major Arcana?The word “arcana” comes from the Latin arcanum, meaning “mystery” or “secret.”The Major Arcana are the “great mysteries” of Tarot, reflecting fundamental forces, principles, and archetypes.Each card represents a specific stage of development, an inner state, an external event of global significance, or an archetypal figure with universal meaning for all of humanity.When a Major Arcana card appears in a spread, it usually points to significant events, profound transformations, important lessons, or deep inner processes that require attention. Its presence emphasizes the weight and depth of the question bei","cat":"Tarot"},{"title":"Structure of the Deck","body":"INTROThe Tarot deck is not a random set of cards, but a carefully structured system that reflects the journey of the human soul its challenges, victories, and lessons. Understanding this structure is the key to deep and intuitive readings.A standard deck consists of 78 cards divided into two main groups: the Major Arcana and the Minor Arcana. MAJOR ARCANA**The word “Arcana” comes from the Latin *arcanum*, meaning “mystery” or “secret”.** The Major Arcana symbolize the great mysteries of life and significant archetypes.These 22 cards are the heart of the Tarot deck. They reflect universal life lessons, archetypal states, key stages of spiritua","cat":"Tarot"},{"title":"History of Tarot","body":"Introduction:Tarot is not just a deck of cards; it is a visual encyclopedia of symbols that has traveled a long path from the Italian gaming tables of the Renaissance to modern spiritual practices. Understanding its history helps us appreciate the depth and evolution of this powerful tool for self-knowledge, intuition, and reflection. Origins in Italy (15th Century)Origins: Tarot emerged in Northern Italy in the first half of the 15th century. It was not a “magical” system but a luxurious deck of playing cards known as “Cartes de Triomphe” (Cards of Triumph) or “Tarocchi.”These cards were used for aristocratic games that combined elements of","cat":"Tarot"},{"title":"Tarot Reading, Demonstration of Abilities","body":"We're excited to introduce a great way to connect with your users and show off your personality! A video introduction will help you immediately attract the attention of even larger audience to chats.In this guide will be described the steps and tips for creating an engaging video!The video duration up to 60 seconds - optimal time during which the user will be able to get to know you and immediately want to enter the chat with you!The main goal of this video is to introduce yourself to your audience and show yours abilities and skills.General Recommendations for Video Recording Preparing for the Video Shoot1. Equipment: Camera: Use a camera or","cat":"Tarot"},{"title":"Поглиблення рідингу","body":"justice, power, responsibility, leadership.The emperor tarot card represents your energy and your desire for stability and independence. This tarot card shows me your strength and desire to achieve success, I see from this tarot card that you want to achieve what you want and find opportunities to solve all the difficulties in your way.Комбінація картЗверніть увагу на взаємодію карт між собою.","cat":"Tarot"},{"title":"Баланс позитиву і негативу","body":"but I see from the Empress tarot card that lately he has been remembering you. dear, I see that there really is a chance for reconciliation here! But..The magician's tarot card shows me that at the moment he has a lot of thoughts about what he really wants and these thoughts do not give him peace.. I see that you are really ready to do a lot to fix everything, I see that you really want to restore this relationship. Now I will help you and give you advice that will lead you on the right path and help you solve difficulties that may happen! my dear, I see several options for the outcome of the situation here, let's check what could happen? my","cat":"Tarot"},{"title":"Відео з містичною атмосферою","body":"(the years of your expertise)Example: “Hello, my dear! My name is Lady Sarah, I'm a tarot reader and energy healer with 10 years of experience. And in this video, I want to immerse you in the magical atmosphere that is part of my life.","cat":"Tarot"},{"title":"Поради для якісних пінгів від топ-експертів.","body":"I’ve got some interesting updates for you. The Tarot shows a fight between him and his wife, which has already impacted him and his thoughts about you as a couple… I’ll be waiting for you in the chat so we can discuss everything. Приклад: \"Hi Jennifer, As we agreed, I'm keeping you updated on the changes... I can see that Mike is starting to doubt his actions, and he's feeling guilty, which is leading to his withdrawal. Darling, how are things between you two? Would you like to check his energy? I also suggest we find out together if his state will improve soon. I know you have a meeting planned for tomorrow, and it’s so exciting.","cat":"Tarot"},{"title":"Як відчувати карти через символи та взаємодію з ними. Ч. 3","body":"“Tarot is a journey, and and it takes time, trust and intuition. Be ok where you are starting and be open to learning.” - Nancy Hayes, tarot reader.","cat":"Tarot"},{"title":"Визначення таймінгів/знаків зодіака/уроків життя по Таро English","body":"Tarot cards and timing, when? answers Wands – spring Swords – fall Cups – summer Pentacles – winterTarot suits and time frame: Wands – days (so, 8 of wands = within 8 days) Swords – weeks (so, 5 of swords = within 5 weeks) Cups – months Pentacles – yearsMajor Arcana and Zodiac Sign: The Emperor – Aries The Heirophant – Taurus The Lovers – Gemini The Chariot – Cancer Strength – Leo The Hermit – Virgo Justice – Libra Death – Scorpio Temperance – Sagittarius The Devil – Capricorn The Star – Aquarius The Moon – PiscesLife Lesson MethodPose a question such as, “when will I meet my soulmate?” and then look at the card as a lesson you need to master","cat":"Tarot"},{"title":"Варіанти розкладів (рідингів) English","body":"QUICK TAROT SPREADS1. Should I…?Opportunities from decision making. What happens if the user chooses or does not choose to act in this way?Tarot spreads for the outcome of events from 1 card (if yes, if no) Tip of 1 card to help the user decide which decision to make2. Analysis of the situation by 3 cardsThis spread could help you to figure out the question more correctly.3. Condition analysisHelps you to look into someone’s mind.(Can be used in relation to native or someone else)4. Probability of resultsThis method is a little longer, but can help you to compare a chance of a few outcomes.First-line cards are interpreted as usual. Second lin","cat":"Tarot"},{"title":"Таро. Молодші Аркани. Чаші English","body":"In divination on Tarot cards, the suit of Cups symbolizes the sphere of feelings and experiences of a person. This is not only love, but also any other strong emotions: joy, anger, excitement, disappointment, sincerity, dreams, fantasies, etc. Water element. The suit of cups in different decks can be shown in the form of chalices, glasses, wells, fountains, etc.Ace of Cups Key words - Love, harmony, carefree, cloudless, joy of life, emotional lift, creativity, abundance. Link to full card profile - https://www.biddytarot.com/tarot-card-meanings/minor-arcana/suit-of-cups/ace-of-cups/Two of Cups Key words - Union with mutuality, partnership, co","cat":"Tarot"},{"title":"Таро. Молодші Аркани. Жезли English","body":"The Wands cards are about action, initiation and invention. Fire element. The suit of wands is represented on the cards in the form of wands respectively, scepters, sticks etc.Ace of Wands Key words - New opportunities, projects, vigor, courage, sexual desire. Link to full card profile - https://www.biddytarot.com/tarot-card-meanings/minor-arcana/suit-of-wands/ace-of-wands/Two of Wands Key words - Long-term plans, ideas, intention, readiness. Link to full card profile - https://www.biddytarot.com/tarot-card-meanings/minor-arcana/suit-of-wands/two-of-wands/Three of Wands Key words - Implementation of plans, start of action, efforts, steps. Lin","cat":"Tarot"},{"title":"Таро. Молодші Аркани. Мечі English","body":"Sword cards are about decisions, mind, intellect, clarity. It’s an air element. These cards say about our mental thingsThis suit can be depicted with a different cold steel, depending on the deck style.Ace of Swords Key words - Sobriety, conquest, triumph, notion, idea, plan. Link to full card profile - https://www.biddytarot.com/tarot-card-meanings/minor-arcana/suit-of-swords/ace-of-swords/Two of Swords Key words - Fear, closeness, listening to yourself, intuition. Link to full card profile - https://www.biddytarot.com/tarot-card-meanings/minor-arcana/suit-of-swords/two-of-swords/Three of Swords Key words - Broken heart, blow, disbalance, g","cat":"Tarot"},{"title":"Таро. Старші Аркани English","body":"Tarot ReadingTarot cards are a tool that can help us to analyze a problem/situation/someone’s actions/etc. and see it more accurately. This “magic deck” can show something more than just basic psychology or logical deduction. Yes, Tarot includes this, but it is something more, like a seer’s mirror. You should know the basic meaning of the Arcanas, but mainly try to base on your own vision and feelings about cards. Deck is divided into Major Arcanas and Minor ones.MAJOR ARCANAThe Major Arcana Tarot cards represent the life lessons, karmic influences and the big archetypal themes that are influencing your life and your soul's journey to enlight","cat":"Tarot"},{"title":"Основна проблематика та шляхи роботи з нею","body":"I miss him very much “То ваша відповідь має бути : “Yes, my dear, I have a 10 of Pentacles card, which indicates that your ex will come back. I see him thinking about you!”3. Тому:Питання: ““Will I have children in the future with the person I'm dating?”Правильно: “My Empress card indicates that you and this man may have children. In general, my dear, this card is very family oriented and it is about deep love in a couple”Не правильно: “I got the Empress card. This card means love, fertility, it often speaks of a good relationship in a couple and the possibility of starting a family, so yes, you will have children.”4. I am really worried abou","cat":"Tarot"},{"title":"Astrological Transit Calendar — February 2026 | Part 2 · February 14–28","body":"Transit date/name Overall impact Impact on areas of life Influence on zodiac signs Expert advice (engagements) 14.02 – Saturn moves into Aries (until 13.04.2028) A long cycle of forming personal responsibility for one's own actions and choices begins. This transit requires mature initiative, the ability to act independently and consciously. The period teaches to build a new identity through discipline, not through struggle. In the professional sphere, there is a growing need to take leadership, but not formally, but backed by responsibility. New projects will require patience and a long-term approach. In personal life, the","cat":"Astrology"},{"title":"Astrological Transit Calendar — February 2026 | Part 1 · February 1–13","body":"Transit date/name Overall impact Impact on areas of life Influence on zodiac signs 01.02 – Full Moon in Leo This transit highlights the theme of self-expression, recognition, and personal worth. Emotions come to the surface, especially where there is a need to be seen or heard. The tension between the desire to shine and the fear of being rejected can intensify. Conflicts between the individual and the collective are likely. This is a culminating moment, because it becomes clear where a person is betraying themselves for the sake of approval. It is clear that something has become outdated and needs to be completed. At work,","cat":"Astrology"},{"title":"Pluto Transits - Signs and Houses","body":"How Pluto Transits Are DeterminedPluto transits show where irreversible processes of deep transformation begin in life. These are points where everything that can no longer survive is destroyed so that something new can take its place. By placing the transit chart over a person’s natal chart, it becomes clear in which areas it is no longer possible to live “as before,” because the changes are radical and permanent.Natal position = lifelong. Transit position = temporaryPluto Transits by Signs and HousesPluto’s position in a zodiac sign creates a long-term background. As the slowest planet, it affects entire generations, changing attitudes towa","cat":"Astrology"},{"title":"Neptune in Houses","body":"Нептун – повільна планета, яка відповідає за духовність, психологію, мистецтво, емоції, вищі сенси. Положення в Знаці Зодіаку не важливе, оскільки це вища планета, яка рухається дуже повільно. Розглядається лише положення в домі.Key Meanings Ілюзія, уява, натхнення, мрії, внутрішній світ, віра в образи Втеча від реальності, залежності, творчість, трансові стани, рятівна любов Сни, інтуїція, містика, ясновидіння, передчуття, символічне мислення Духовність, віра, езотерика, релігія, мораль, філософія Внутрішній світ, психологія, тонкі відчуття, підсвідомі сигнали Творчість, мистецтво, кіно, музика, живопис, натхнення, образність Самотність, від","cat":"Astrology"},{"title":"Uranus Transits - Signs and Houses","body":"How Uranus Transits Are DeterminedUranus transits show where a breakthrough, liberation, or a sudden change of direction occurs in life. By overlaying the transit chart onto the natal chart, it becomes clear which areas are breaking down outdated patterns and where there is a need to live differently, more authentically, and more freely.Natal position = lifelong. Transit position = temporaryUranus Transits by Signs and HousesUranus’s position in a zodiac sign forms a long-term collective background. Because this is a very slow-moving planet, its influence in a sign is perceived as an epochal theme of a generation: changes in values, thinking,","cat":"Astrology"},{"title":"Neptune Transits - Signs and Houses","body":"How Neptune Transits Are DeterminedТранзити Нептуна показують, де стираються чіткі межі реальності, а життя починає сприйматися через призму образів, віри та внутрішніх відчуттів. Через накладання транзитної карти на натальну стає зрозуміло, у яких сферах посилюється вплив уяви, ідеалізації або, навпаки, розчарування.Натальне положення = пожиттєве. Транзитне положення = тимчасове Neptune Transits by Signs and HousesПоложення Нептуна в знаку Зодіаку створює тривалий фон. Як дуже повільна планета, він формує світогляд поколінь, змінює уявлення про істину, віру, мораль та духовні цінності. Найбільш відчутно Нептун проявляється у русі по домах на","cat":"Astrology"},{"title":"Astrology Archetypes as Spirit Animals","body":"Zodiac signs are not merely psychological types or superficial “personality traits.” At their core, each sign is an archetype — a primordial image that exists beyond time and culture. Archetypes shape our unconscious perception of life, roles, crises, initiations, and paths of growth.The myths associated with the Zodiac are not fairy tales, but encoded maps of spiritual evolution. And the animals that accompany these signs act as spiritual animals — guides that embody the instinctual, bodily, and energetic dimension of each archetype.♈ AriesLegend: The Golden FleeceSpiritual animal: RamArchetypeAries is the archetype of beginnings, impulse, t","cat":"Astrology"},{"title":"Saturn Transits - Signs and Houses","body":"How Saturn Transits Are DeterminedТранзити Сатурна розраховуються завдяки накладанню транзитної карти (поточна карта руху планети) на натальну карту. Таким чином є можливість максимально точно передбачати особисті події та тенденції.Натальне положення = пожиттєве. Транзитне положення = тимчасове Saturn Transits by Signs and HousesПоложення Сатурна в знаках Зодіака створює тривалий фоновий вплив. Як повільна планета, він формує загальні уроки періоду, які не відчуваються щодня, але поступово змінюють підхід до життя. Набагато особистіше проявляється рух Сатурна по домах натальної карти. Оскільки Сатурн рухається повільно, його транзити відчува","cat":"Astrology"},{"title":"Jupiter Transits - Signs and Houses","body":"How Jupiter Transits Are DeterminedТранзити Юпітера показують, де у житті відкриваються можливості для зростання, розвитку та розширення горизонтів. Аналіз відбувається через накладання транзитної карти на натальну, що дозволяє побачити сфери, у яких потенціал стає більшим, а події масштабнішими.Натальне положення = пожиттєве. Транзитне положення = тимчасове Jupiter Transits by Signs and HousesПоложення Юпітера в знаку Зодіаку формує загальний фон періоду. Оскільки це повільна планета, її вплив у знаку сприймається як тривала тенденція, яка не завжди відчувається щоденно. Набагато особистіше проявляється рух Юпітера по домах натальної карти.","cat":"Astrology"},{"title":"Mars Transits - Signs and Houses","body":"How Mars Transits Are DeterminedАналіз транзитів відбувається через накладання транзитної карти на натальну. Це дозволяє побачити, у яких сферах життя зростає напруга, мотивація та бажання рухатися вперед.Натальне положення = пожиттєве. Транзитне положення = тимчасове Mars Transits by Signs and HousesРух Марса по знаках Зодіаку відображає загальний стиль дій, рівень рішучості та спосіб реалізації енергії в певний період. Проходження Марса по домах натальної карти має персональне значення. Саме тут стає зрозуміло, де людина готова боротися за своє, відстоювати позицію, ризикувати або активно змінювати ситуацію.Найсильінший вплив - проходження","cat":"Astrology"},{"title":"Moon in Signs and Houses","body":"The Moon – the second most important planet in the natal chart (some even consider it the most important). It shows our emotions, comfort zone, and subconscious needs.Key MeaningsSoul, inner world, emotions and needs, subconscious reflectionSecurity, comfort, protection, rest, familiar environmentEmotions, deep reactions, sensitivity, expression of feelingsPerception of the world, unconscious perspective, adaptabilityImmediate reactions, instinctive actions, stress responsesSubconscious, automatic patterns, childhood conditioningFamily, lineage, family values, traditions, sense of belongingMother, care, tenderness, nurturingIntuition, psychol","cat":"Astrology"},{"title":"Sun in Signs and Houses","body":"☀️ The Sun – the most important planet in the natal chart. It is considered first and shows who we are, our personality.Key Meanings1. Personality, “I”, character, self-identity.2. Will, decisions, motivation, inner support.3. Self-expression, charisma, style, ways of presenting oneself.4. Confidence, self-esteem, dignity, sense of personal value.5. Energy, life force, interest in life, inspiration.6. Talents, creativity, natural abilities, self-realization.7. Hobbies, things that inspire and allow self-expression.8. Inner child, joy, play, genuine “I want”.SUN IN THE ZODIAC SIGNSSun in AriesManifestation Impulsive actions and a drive to star","cat":"Astrology"},{"title":"Lunar Return","body":"Lunar ReturnA Lunar Return is a forecast for a monthly cycle, lasting from one return of the Moon to its natal position to the next (approximately 28 days). It highlights daily and routine trends, minor events, and sometimes significant changes during the month. Unlike the Solar Return, the Lunar Return acts as a short-term “fixed” transit, helping track the resonance between the natal chart and the current sky through the lens of the Moon.The Lunar Return occurs at the exact monthly return of the Moon to its natal position (±1 hour). Like the Solar Return, it is a fixed transit but for a shorter period, focusing on emotional, daily, and rout","cat":"Astrology"},{"title":"Solar House Meanings","body":"Although all Solar Return planets in Solar Return Houses are analyzed, here we will focus on the most essential indicators: the Sun, the Moon, and the Ascendant.Solar SunSolar Return Sun in a Solar Return HouseThe position of the Sun in the Solar Return shows how a person’s personality will develop throughout the year, which inner forces will be activated, and in which life area they will be able to express themselves most vividly. It represents the core of the year - the focal point of events, the direction of growth, inner fire, and creative impulse.The Sun indicates where a person will feel the greatest inspiration and desire to act, where","cat":"Astrology"},{"title":"Solar Return Intro","body":"Solar ReturnA Solar Return is a forecast for a personal year that lasts from one birthday to the next. It shows the main trends, life areas, and potential events for this period. Unlike transits, which change daily, the Solar Return creates a stable energetic background for the year, gradually revealing tendencies and potential across different areas of life.Inside - the natal SunOutside - the transiting SunA Solar Return occurs at the moment of the Sun’s annual return to its exact natal position, to the same degree as on the day of birth (±1 day). It reflects the resonance between the natal chart and the current sky configuration through the","cat":"Astrology"},{"title":"Saturn and Karma","body":"KARMIC DEBTS AND THE FUNCTIONS OF SATURNWhat Are Karmic DebtsIn astrology, karmic debts are associated with Saturn. It shows what or whom we are responsible for, where we must take accountability, and in which areas of life we are expected to act as mature and conscious adults.Saturn is the planet of cause-and-effect. It highlights the themes where our conscience, sense of duty, and inner discipline are activated.The houses ruled by Saturn (Capricorn) indicate life areas that require maturity, perseverance, and structure. These areas often do not feel emotionally warm or “natural”, yet they form our internal framework.The House of Saturn as a","cat":"Astrology"},{"title":"Psychology of Ascendent (Rising Sign)","body":"Ascendant and DescendantGeneral ConceptThe Ascendant is the point that describes our ego, self-perception, and the starting position of the personality in the world. Significator: Mars, 1st house.The Descendant represents the Other, the partner, the social mirror, and the expectations of the outside world. Significator: Venus, 7th house.The Ascendant describes our natural way of being, how we instinctively react, and how our physical nature and behavior manifest.The Descendant reflects what the external world expects from us: partners, groups, society. It is an “alter ego”, a position of adaptation, interaction, and mimicry. Ascendant and Des","cat":"Astrology"},{"title":"Venus Transits - Signs and Houses","body":"How Venus Transits Are DeterminedДля аналізу транзитів Венери транзитну карту (актуальне положення планетb на небі) накладають на натальну карту людини. Це дозволяє зрозуміти, у яких сферах життя активізується енергія взаємин, краси та фінансів.Натальне положення = пожиттєве. Транзитне положення = тимчасове Venus Transits by Signs and HousesТранзити Венери по знаках Зодіаку дають загальний прогноз. Вони показують загальний настрій періоду, спосіб прояву емоцій, почуття гармонії, привабливість та взаємодію з оточенням. Транзити Венери по домах натальної карти формують особистий прогноз. Вони демонструють, у яких конкретних сферах життя виникаю","cat":"Astrology"},{"title":"Special Positions of The Planets","body":"Special Planetary ConditionsPLANETS IN CRITICAL DEGREES(0–3° and 28–30° of a sign)General logic of critical degreesEach zodiac sign contains 30 degrees, and the entire zodiac equals 360°. If we divide 30° by 12, we get 2.5°, which forms the basis of the concept of critical degrees. In practice, the first and last three degrees are used, since the number three symbolizes the archetype of cyclicity, beginnings, and endings.Critical degrees are a threshold between signs, a point of entry or exit that is always associated with crisis, transition, change of environment, and internal restructuring.1. The first 3° of a sign, the yang, impulsive sect","cat":"Astrology"},{"title":"Mercury Transits - Signs and Houses","body":"How Mercury Transits Are DeterminedTo analyze Mercury transits, a transit chart (the planet's current position in the sky) is superimposed on a person's natal chart. This helps to understand in which areas of life the energy of thinking, communication, and information exchange is currently activated.Natal position = lifelong. Transit position = temporaryMercury Transits by Signs and HousesTransits of Mercury through the signs of the Zodiac give a general forecast that describes the way of thinking, communication style and general information flows at a certain moment. Transits of Mercury through the houses of the natal chart form a personal f","cat":"Astrology"},{"title":"Essential Dignities","body":"WHAT ARE PLANETARY DIGNITIES?Planetary dignities describe the specific condition of a planet in a particular sign.The same planet expresses itself differently in different signs, and each sign provides its own conditions - either supportive or challenging.All dignities are divided into:Strengths (strong positions): Domicile ExaltationWeaknesses (challenging positions): Detriment FallImportant: weakness ≠ bad, strength ≠ guaranteed good.Each position is simply a different way for planetary energy to manifest. DOMICILEStrengthWhat it is:A planet is in the sign it rules. For example: Venus in Taurus or Mars in Aries.How it manifests:The planet","cat":"Astrology"},{"title":"Moon Transits - Signs and Houses","body":"How Moon Transits Are DeterminedTo analyze Moon transits, a transit chart (the current position of the planets in the sky) is superimposed on a person’s natal chart. This allows you to see what emotional states, internal reactions, and needs are activated at a specific moment in time.Natal position = lifelong. Transit position = temporaryMoon Transits by Signs and HousesMoon transits by Zodiac signs show the general emotional background of the period. They describe the mood, reactions, level of sensitivity, and way of experiencing events that is common to many people. In turn, Moon transits by houses form a personal forecast. It is the houses","cat":"Astrology"},{"title":"Sun Transits - Signs and Houses","body":"How Solar Transits Are DeterminedДля аналізу транзитів Сонця транзитну карту (актуальне положення планет на небі) накладають на натальну карту людини. Такий підхід дозволяє отримати максимально точний і персональний прогноз та побачити, які теми життя активуються саме зараз.Натальне положення = пожиттєве. Транзитне положення = тимчасовеSun Transits through the Signs and HousesТранзити Сонця по знаках Зодіаку дають загальний прогноз. Вони описують фон періоду, загальні настрої, колективні тенденції та спосіб прояву сонячної енергії для більшості людей. Натомість транзити Сонця по домах натальної карти формують особистий прогноз. Саме доми пока","cat":"Astrology"},{"title":"Pluto in Houses","body":"Плутон – повільна планета, яка відповідає за трансформації, кризи, відродження, владу, вплив, контроль, фінанси. Положення в Знаці Зодіаку не важливе, оскільки це вища планета, яка рухається дуже повільно. Розглядається лише положення в домі.Key Meanings Трансформації, кризи, відновлення, переродження, драматичні переходи Інтенсивність, крайнощі, все або нічого, глибокі потрясіння Робота з чужими ресурсами, контроль фінансів, ризики, багатство через кризу Влада, маніпуляції, прихований вплив, силові структури, контроль над іншими Таємниці, дослідження глибин, заборонені теми, містика, психоаналіз Підозри, параноя, недовіра, сильна інтуїція, е","cat":"Astrology"},{"title":"Uranus in Houses","body":"Uranus is a slow planet that is responsible for freedom, independence and gives sudden and unexpected changes in life. The position in the Zodiac Sign is not important, since it is a higher planet that moves very slowly. Only the position in the house is considered.Key Meanings Freedom, equality, rebellion, independence, rejection of rules Resistance to the system, stereotypes, minority rights, global social issues Progress, technology, science, experiments, inventions, non-standard solutions Future, plans, dreams, ideals, non-standard career, reformism Space, sky, astrology, astronomy, exact sciences, distant spaces Intelligence, insig","cat":"Astrology"},{"title":"Saturn in Signs and Houses","body":"Сатурн – повільна планета, яка відповідає за кар’єру, дисципліну, плани, серйозність та відповідальність. Положення в Знаці Зодіаку не таке важливе, як положення в домі, тому що Сатурн проходить 1 знак за 2.5 роки і, відповідно, у великої кількості людей буде займати таке саме положення.Key Meanings Структура, порядок, дисципліна, відповідальність Терпіння, витривалість, стабільність, поступовість Кар’єра, досягнення, репутація, авторитет Контроль, організованість, точність, правила Цінність, матеріали, класика, довговічність Зрілість, самокритичність, раціональність, логіка Планування, системність, послідовність, стратегія Обмеження, мінімал","cat":"Astrology"},{"title":"Jupiter in Signs and Houses","body":"Jupiter is a slow planet that is responsible for plans, goals, ambitions and worldview. The position in the Zodiac Sign is not as important as the position in the house, because Jupiter passes 1 sign in 1 year and, accordingly, will occupy the same position for a large number of people.Key Meanings Worldview, global thinking, leadership, big goals New knowledge, travel, social connections, increase in resources Recognition, fashionable, elitist, career, reputation Travel, foreigners, cultures, languages, partnership High goals, mission, leadership, large-scale projects Teaching, mentoring, transferring wisdom, helping work Philosophy, e","cat":"Astrology"},{"title":"Mars in Signs and Houses","body":"Mars is the planet of action, undertakings, physical activity. In a man's chart it is more important than in a woman's.Key Meanings1. Action, initiative, quick start2. Impulsiveness, determination, leadership3. Struggle, defense, response to a challenge4. Strength, endurance, physical activity5. Aggression as the energy of movement6. Temperament, will, pressure7. Sports, competition, victory8. Sexuality through action and the bodyMARS IN THE ZODIAC SIGNSMars in AriesGeneral Traits Explosive energy, fast reactions, moves straight toward goals Needs immediate outcomes, easily irritated by delays Takes risks impulsively, expresses emotions sharp","cat":"Astrology"},{"title":"Venus in Signs and Houses","body":"Венера – планета грошей, матеріальних цінностей, а також стосунків та спілкування. В жіночій карті важливіша, ніж у чоловічій.Key Meanings Матеріальні ресурси, фінансова стабільність Комфорт, задоволення, земні радощі Любов до краси, природи, речей Практичність, накопичення, насолода процесом Партнерство, гармонія у стосунках Дипломатія, компроміс, рівновага Естетика, стиль, приємний зовнішній вигляд Соціальна взаємодія, співпраця, взаємна підтримкаVENUS IN THE ZODIAC SIGNSVenus in AriesGeneral Traits: Impulsive, energetic, bold, loves excitement Quick to act, enthusiastic, and enjoys challenges Charismatic, attracts attention easily, enjoys","cat":"Astrology"},{"title":"Mercury in Signs and Houses","body":"Меркурій – планета комунікації, інформації, навчання та поїздок. Не найважливіший в карті, оскільки розглядається у вузькому контексті. Але необхідний для щоденного використання.Key Meanings Мислення, інтелект, швидка обробка інформації Комунікація, мова, діалоги, письмова робота Навчання, цікавість, базова освіта Рухливість, координація, зміна локацій Транспорт, поїздки на короткі відстані Документи, нотатки, папери Торгівля, реклама, обмін інформацією Рутина, повсякденні процеси, порядок Праця, обов’язки, служіння, користь Організація, системність, деталі Аналіз, оптимізація, точність MERCURY IN THE ZODIAC SIGNSMercury in Aries Mindset: im","cat":"Astrology"},{"title":"Aspects","body":"Aspects are relationships or connections between planets in a natal chart.A planet placed in a Sign and a House represents an inherent life theme or condition - something given by nature, which does not need to be consciously activated, as it accompanies the person naturally.Aspects, however, represent external manifestations: events, people, objects, or opportunities that a person can interact with, use, or respond to.Base and ModifierEach aspect is formed by two planets: the stronger planet (the modifier, the slower-moving one), and the weaker planet (the base, the faster-moving one).BaseThe base is the planet that moves faster due to its s","cat":"Astrology"},{"title":"House Systems.","body":"The House grid, which starts from the Ascendant (1st House), is an astrological construct that did not appear immediately but developed later as astrological observation evolved. Even today, there are ongoing discussions within the astrological community a
