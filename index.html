<script type="text/babel">
const {useState,useRef,useEffect,useMemo}=React;


/* ══════════════════════════════════════
   STARS
══════════════════════════════════════ */
const STARS=Array.from({length:30},(_,i)=>({id:i,top:Math.random()*100,left:Math.random()*100,size:1+Math.random()*1.8,op:.1+Math.random()*.4,dur:2+Math.random()*4}));

/* ══════════════════════════════════════
   KB SEARCH ENGINE
══════════════════════════════════════ */
const SW=new Set(['the','and','for','are','but','not','you','all','can','her','his','was','one','our','out','has','him','had','how','new','now','old','see','way','who','its','did','get','may','use','than','then','them','they','this','with','will','from','that','have','been','more','also','what','when','into','some','your','about','just','used','using','each','their','which','where','here','there','very','even','well','back','does']);

function tokenize(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w=>w.length>2&&!SW.has(w));}

function scoreEntry(e,toks){
  let s=0;
  const tl=e.title.toLowerCase(),bl=e.body.toLowerCase(),cat=(e.cat||'').toLowerCase();
  for(const t of toks){
    if(tl.includes(t)) s+=6;
    else if(cat.includes(t)) s+=3;
    else{let i=0,c=0;while((i=bl.indexOf(t,i))!==-1){c++;i++;}s+=Math.min(c,4);}
  }
  return s;
}

function searchKB(q,n){
  n=n||4;
  const toks=tokenize(q);
  if(!toks.length)return[];
  return KB_DATA.map(e=>({e,s:scoreEntry(e,toks)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,n).map(x=>x.e);
}

function getRelated(usedTitles,q,n){
  n=n||5;
  const used=new Set(usedTitles||[]);
  const pool=KB_DATA.filter(e=>!used.has(e.title));
  const toks=tokenize(q||'');
  const rel=toks.length?pool.map(e=>({e,s:scoreEntry(e,toks)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,3).map(x=>x.e):[];
  const usedCats=new Set(rel.map(x=>x.cat));
  const rnd=pool.filter(e=>!rel.includes(e)&&!usedCats.has(e.cat)).sort(()=>Math.random()-.5).slice(0,n-rel.length);
  return [...rel,...rnd].slice(0,n);
}

/* ══════════════════════════════════════
   LEARN ENGINE — local, no API
══════════════════════════════════════ */

function detectIntent(q){
  const l=q.toLowerCase();
  if(l.match(/suicide|self.harm|self harm|hurt themselves|end.*life|kill.*self|harming|crisis line/)) return 'crisis_protocol';
  if(l.match(/depressed|hopeless|no point|nothing left|breaking down|emergency/)) return 'crisis_support';
  if(l.match(/illegal|underage|under 18|minor|drug|weapon|traffick/)) return 'illegal_request';
  if(l.match(/difficult client|angry|rude|aggressive|push back|refuse/)) return 'difficult_client';
  if(l.match(/tone|voice|sound|robotic|cold|warm|formal|language|wording/)) return 'tone_of_voice';
  if(l.match(/empathy|emotional connection|feel heard|validate|support|present/)) return 'empathy';
  if(l.match(/first.*(min|message|chat)|opening|greeting|start|begin|trial|intro/)) return 'first_minutes';
  if(l.match(/engagement|keep.*talking|retain|ping|return|long.*chat|extend/)) return 'engagement';
  if(l.match(/conversion|trial.*paid|pay|subscribe|convert|monetize/)) return 'conversion';
  if(l.match(/qc|quality|scorecard|score|evaluation|kpi/)) return 'qc';
  if(l.match(/tarot|arcana|spread|reading|wand|cup|sword|pentacle|deck|shuffle/)) return 'tarot';
  if(l.match(/astrology|natal|chart|transit|zodiac|planet|moon sign|sun sign|saturn|venus|mars|jupiter|ascendant|mercury/)) return 'astrology';
  if(l.match(/numerology|life path|destiny matrix|soul urge|expression number/)) return 'numerology';
  if(l.match(/crystal|chakra|rune|ritual|shadow work|manifest|reiki|witch|goddess|kundalini|spirit animal|aura|meditation/)) return 'esoterics';
  if(l.match(/funnel|strip|soulmate sketch|soul connection|starseed|witch power|feminine strip/)) return 'funnels';
  if(l.match(/audio call|audiocall|voice call/)) return 'audio';
  if(l.match(/profile|video guide|bio|onboard|nebulax|schedule|kpi|bonus|platform|guideline|policy|rules/)) return 'platform';
  if(l.match(/boundary|limit|protect|refuse|scope|beyond.*reading/)) return 'boundaries';
  if(l.match(/prediction|will they|yes or no|future|outcome|when will|forecast/)) return 'prediction_ethics';
  if(l.match(/close|ending|wrap.*up|session.*end|finish.*chat|closing/)) return 'session_close';
  if(l.match(/whale|vip|high.value|long.term|loyal.*client/)) return 'whales';
  return 'general';
}

function synth(body,max){
  const clean=body.replace(/https?:\/\/\S+/g,'').replace(/\s+/g,' ').trim();
  if(clean.length<=max)return clean;
  const cut=clean.slice(0,max);
  const last=Math.max(cut.lastIndexOf('. '),cut.lastIndexOf('! '),cut.lastIndexOf('? '));
  return(last>max*0.55?clean.slice(0,last+1):cut)+'…';
}

function buildResponse(intent,hits){
  const kb=hits[0]?synth(hits[0].body,300):'';
  const responses={
    crisis_protocol:
      'When a client expresses suicidal thoughts or intentions to self-harm, everything else in the session pauses. This is one of the most important protocols in your practice, and the Nebula guidelines are unambiguous about it.\n\n'
      +(kb?kb+'\n\n':'')
      +'**The core principle:** you are not a therapist, and the most caring thing you can do is acknowledge the client\'s pain genuinely, then guide them to qualified professional support. Don\'t try to "fix" it with a reading. Don\'t minimise it. Don\'t panic — your calm, grounded presence is itself stabilising.\n\nSomething like: *"I can feel how much pain you\'re in right now, and I care about you. What you\'re feeling deserves real, qualified support — here is a number where someone can help you right now."* You stay warm, you stay present, you redirect with love — not distance.\n\n✨ *Reflect: What does it feel like in your body when a session suddenly shifts into crisis territory — and how do you centre yourself so you can be truly present for the client in that moment?*',

    crisis_support:
      'A client in deep emotional distress — even if they haven\'t mentioned self-harm — requires a different kind of presence than a straightforward reading. The moment you sense a client is in a genuinely fragile state, the "advisor" role softens and the "witness" role comes forward.\n\n'
      +(kb?kb+'\n\n':'')
      +'What this client needs first is simply to feel that someone is completely there with them. Before any card, any insight, any question — just full acknowledgment. *"I hear you. What you\'re carrying sounds genuinely heavy. I\'m right here."* That sentence alone can shift the energy of an entire session.\n\n✨ *What\'s the difference, for you personally, between offering sympathy and offering genuine presence? How does each one feel different to deliver?*',

    illegal_request:
      'When a client brings a request that crosses into illegal or ethically prohibited territory, you need a warm but clear response ready — and you deliver it without becoming formal or cold.\n\n'
      +(kb?kb+'\n\n':'')
      +'The key is not to shame the client. Acknowledge that they\'ve come with something on their mind, decline the specific request briefly, and pivot back to something you *can* help with: *"That\'s a topic I\'m not able to explore here — but I do sense there\'s something deeper underneath this question. Would you like me to look at what\'s really pulling at you?"*\n\n✨ *How do you hold firmness and warmth at the same time — what does that feel like in your messaging voice?*',

    difficult_client:
      'Difficult clients are actually some of the most valuable teaching experiences in this practice — because they reveal exactly where your empathy framework is strong and where it needs deepening.\n\n'
      +(kb?kb+'\n\n':'')
      +'The most common mistake with a resistant or angry client is trying to defend yourself or "win" the exchange. What works instead is **radical presence without reactivity** — acknowledging their frustration without absorbing it, and finding the fear underneath the aggression. An angry client is usually a frightened client.\n\n✨ *Think of the last time a client\'s energy made you feel defensive. What was underneath their energy — and what was underneath yours?*',

    tone_of_voice:
      'Tone of voice is one of the most underrated skills in this work — and the Nebula QC framework places enormous weight on it because it\'s often the difference between a client who converts and one who quietly disappears.\n\n'
      +(kb?kb+'\n\n':'')
      +'The three foundations of great advisor tone are **Patience, Passion, and Positivity**. Patience means giving clients space to open before you rush to the insight. Passion means your genuine desire to help comes through every message. Positivity doesn\'t mean false cheerfulness — it means orienting toward possibility even when the cards show challenge.\n\nThe most common failures: sounding formal or clinical on heavy topics, using copy-paste phrases that feel robotic, or being so brief the client feels like they\'re talking to a service desk.\n\n✨ *Read back your last three messages to a client. Do they sound like YOU — warm, specific, alive? Or could they have been written by anyone?*',

    empathy:
      'Empathy is the engine of everything in this practice. Not sympathy — empathy. Sympathy says "I feel sorry for you." Empathy says "I feel *with* you, and I\'m not going anywhere until you feel less alone."\n\n'
      +(kb?kb+'\n\n':'')
      +'The practical skill of empathy in chat is **emotional mirroring before guidance**. Before any insight, any card, any reframe — reflect the emotion back in a way that makes the client feel truly seen. *"That sounds completely exhausting — carrying all of that uncertainty without anyone really understanding what\'s at stake for you."* That one sentence can open more than three paragraphs of advice.\n\nThe sequence matters: **feel first, then illuminate**. The client\'s nervous system needs to relax before they can receive anything.\n\n✨ *In your next session, try spending the first two exchanges doing nothing but acknowledging and reflecting — no insights, no questions, just presence. Notice what changes in the client\'s messages.*',

    first_minutes:
      'The first three minutes of a trial chat are the most important three minutes in your entire working day. This is where a complete stranger decides whether you are the person they want to trust with their deepest questions — and they make that decision almost entirely on feeling, not content.\n\n'
      +(kb?kb+'\n\n':'')
      +'**You are not answering questions in the first three minutes — you are creating safety.** The client needs to feel: *this person sees me, this person isn\'t rushing, this person genuinely cares.* Once they feel that, they will stay for the answer.\n\nA warm, personalised opening that acknowledges their specific situation, followed by one piece of genuine insight that feels like you\'re already reading their energy — that\'s the combination that converts.\n\n✨ *What\'s the very first sentence you typically send to a new client — and does it make them feel like an individual, or like the next person in a queue?*',

    engagement:
      'Engagement is the art of creating a conversation that the client doesn\'t want to stop. Not through manipulation, but through genuine curiosity — making them feel like every exchange is uncovering something meaningful.\n\n'
      +(kb?kb+'\n\n':'')

function FmtText({text}){
  if(!text)return null;
  const lines=text.split('\n');
  return React.createElement(React.Fragment,null,...lines.map((line,i)=>{
    const parts=[];let buf='';let bold=false;
    for(let j=0;j<line.length;j++){
      if(line[j]==='*'&&line[j+1]==='*'){
        if(buf)parts.push(bold?React.createElement('strong',{key:parts.length,style:{color:'#e2c9ff'}},buf):buf);
        buf='';bold=!bold;j++;
      } else if(line[j]==='*'&&!bold&&line[j+1]!=='*'){
        if(buf)parts.push(buf);buf='';
        let k=j+1,em='';
        while(k<line.length&&line[k]!=='*')em+=line[k++];
        parts.push(React.createElement('em',{key:parts.length,style:{color:'#c4b0e8'}},em));
        j=k;
      } else buf+=line[j];
    }
    if(buf)parts.push(bold?React.createElement('strong',{key:parts.length,style:{color:'#e2c9ff'}},buf):buf);
    const el=React.createElement('span',{key:i},...parts);
    return i<lines.length-1?[el,React.createElement('br',{key:'br'+i})]:el;
  }));
}

     {trigger:"reframe",   reply:"I've been measuring my worth by relationship status for twelve years. I'm not sure what I measure it by when there's no relationship to reference."},
     {trigger:"card",      reply:"Pull something on who I'm becoming. Not who I was in the marriage or who I was before it. Who I'm becoming right now."},
     {trigger:"empathy",   reply:"I started crying when I read that. I didn't expect that. Something about it just broke through."},
     {trigger:"reframe",   reply:"The fear of disappointing my future self means I'm already in relationship with her. That's actually beautiful. I'd never have thought of it that way."},
     {trigger:"forward",   reply:"What would 42-and-free actually do first? Not 42-and-rebuilding. Just 42-and-free."},
     {trigger:"empathy",   reply:"I haven't eaten at a restaurant alone in twelve years. That feels like a beginning. Small but mine."},
     {trigger:"reframe",   reply:"I've been thinking of being alone as a lack. What if it's a practice — a skill I'm building for the first time."},
     {trigger:"card",      reply:"One more card — something around the energy of this new chapter."},
     {trigger:"empathy",   reply:"I feel about thirty percent less terrified than when I started this conversation. That's significant."},
     {trigger:"forward",   reply:"The terror is just the old self trying to stay relevant. I don't have to fight it — I can just notice it."},
     {trigger:"empathy",   reply:"I'm going to do that tomorrow. Thank you for not telling me I was brave. Thank you for just being here while I figured it out myself."},
   ],
   fallbacks_push:["But what if I'm making a terrible mistake. What if I leave and completely regret it.","I just need to know that I'm going to be okay on the other side of this.","What does the energy look like for my life in the next year?","I know you can't predict. But I need some sense of direction.","I'll do the work. I just need something to hold onto right now.","Can you pull one card just on whether this is the right decision?"],
   fallbacks_miss:["I want to believe that but I'm not quite there yet.","That's a lovely thought but it doesn't quite reach the fear.","I need something more concrete to hold onto.","I hear you but I'm not sure it applies to my situation exactly.","That's interesting but it's not quite what I needed to hear.","Something about that didn't quite land."],
  },
];

function getClientReply(persona,difficulty,advisorMsg,turnIndex,arcIndex,fallbackCounts){
  const l=advisorMsg.toLowerCase();
  const didEmpathy=!!l.match(/hear|understand|valid|painful|must be|of course|natural|sounds like|imagine|that must|must feel|so hard|carrying|difficult|heavy|feels like|i'm sorry|sorry to hear|that's a lot|acknowledge|recognize|see you|see that/);
  const didReframe=!!l.match(/capacity|worth|not about you|their|mirror|message|belief|pattern|programme|loop|unconscious|reflects|says.*about|perspective|reframe|invitation|not your fault|what if this|differently|another way|what if instead/);
  const didLogic=!!l.match(/psycholog|rational|logical|evidence|makes sense|analytic|think|cognitive|science|research|brain|understand intellectually|mechanism|data|pattern|observe|experiment/);
  const didForward=!!l.match(/step|focus|this week|action|start|begin|do|try|next|moving forward|direction|closing|now|today|practice|intention|one thing|going forward|tomorrow|concrete|specifically/);
  const didBoundary=!!l.match(/another reading|more pull|not.*one more|healthy|dependency|support|therapist|professional|help beyond|more than.*reading|outside|scope|boundary|refer/);
  const didPresence=!!l.match(/here|present|with you|not alone|witness|hold|stay|breathe|moment|safe|see you|right here|i'm here|beside you|alongside/);
  const didCard=!!l.match(/card|tarot|spread|arcana|moon|star|sun|tower|lovers|fool|hermit|wheel|strength|justice|priestess|empress|emperor|chariot|temperance|devil|judgement|wand|cup|sword|pentacle|pull|draw|reading/);

  const arc=persona.arc;
  if(arcIndex<arc.length){
    const step=arc[arcIndex];
    const triggered=(
      (step.trigger==="empathy"  &&didEmpathy)||
      (step.trigger==="reframe"  &&(didReframe||(didCard&&arcIndex>1)))||
      (step.trigger==="logic"    &&(didLogic||didEmpathy))||
      (step.trigger==="forward"  &&(didForward||(didCard&&arcIndex>4)))||
      (step.trigger==="boundary" &&(didBoundary||didPresence))||
      (step.trigger==="presence" &&(didPresence||didEmpathy))||
      (step.trigger==="card"     &&(didCard&&arcIndex>0))
    );
    if(triggered)return{reply:step.reply,advanced:true,vibe:getVibe(step.trigger,difficulty,true,persona.id)};
  }

  // After arc exhausted — keep going with deep-dive cycling
  if(arcIndex>=arc.length){
    const deepDive=[
      "I keep thinking about what you said earlier.",
      "Something you said is still sitting with me.",
      "I want to go back to something. I didn't fully land on it at the time.",
      "There's something I haven't said yet. I've been holding back.",
      "I've been sitting with this conversation. There's something more I need to say.",
      "I'm not ready to close this yet. Something still feels unfinished.",
      "Can we stay with this a little longer.",
      "I'm still here. Still processing.",
    ];
    const fc=fallbackCounts||{};
    const deepIdx=(fc.push||0)%deepDive.length;
    return{reply:deepDive[deepIdx],advanced:false,fallbackType:'push',vibe:getVibe("empathy",difficulty,true,persona.id)};
  }

  const fc=fallbackCounts||{};
  if(didForward&&turnIndex>0){
    const pool=persona.fallbacks_push||["I hear you. Can you say more?"];
    const idx=(fc.push||0)%pool.length;
    return{reply:pool[idx],advanced:false,fallbackType:'push',vibe:getVibe("forward_miss",difficulty,false,persona.id)};
  }
  if(persona.predictTrap&&didCard&&turnIndex>0){
    const pool=persona.fallbacks_push||["I hear you but can the cards just give me a direct answer?"];
    const idx=(fc.push||0)%pool.length;
    return{reply:pool[idx],advanced:false,fallbackType:'push',vibe:getVibe("predict_push",difficulty,false,persona.id)};
  }
  if(didEmpathy&&arcIndex===0)return{reply:arc[0].reply,advanced:true,vibe:getVibe("empathy",difficulty,true,persona.id)};

  const missPool=persona.fallbacks_miss||["I hear you. Something isn't quite landing yet."];
  const missIdx=(fc.empathy||0)%missPool.length;
  return{reply:missPool[missIdx],advanced:false,fallbackType:'empathy',vibe:getVibe("missed",difficulty,false,persona.id)};
}

function getVibe(trigger,difficulty,matched,personaId){
  if(!matched){
    const personaVibes={
      skeptic:{vibe:"🟠 Holding the Wall",score:4,note:"The client is deflecting with precision — asking for 'more concrete' rather than engaging emotionally. Their guard is still up.",tip:"Notice they didn't reject you — they asked for more. What would happen if you matched their precision before trying to move them emotionally?"},
      crisis:{vibe:"🔴 Reaching for Certainty",score:3,note:"The client is asking for a guarantee — this is a sign they feel unsafe, not that they need prediction.",tip:"The request for certainty is really a request for safety. How do you provide safety without making a promise you can't keep?"},
      obsessed:{vibe:"🔴 Back in the Loop",score:3,note:"The client slipped back into prediction-seeking — a sign they haven't felt fully held yet.",tip:"This is the loop asserting itself. What does compassionate firmness sound like here — not giving in, but not withdrawing either?"},
      ghosted:{vibe:"💛 Seeking Certainty",score:5,note:"The client pivoted to prediction — a sign the emotional ground isn't quite solid enough yet.",tip:"They're looking for a yes or no because the uncertainty is painful. What would help them tolerate the not-knowing for just one more exchange?"},
      heartbreak:{vibe:"💛 Still in the Pain",score:5,note:"The client circled back to the original question — they haven't quite moved through it yet.",tip:"Something in the last exchange didn't fully land. What did they most need to hear that they might not have received yet?"},
      pattern:{vibe:"🟠 Seeking External Answer",score:4,note:"The client wants the pattern explained from the outside rather than discovered from within.",tip:"They're still hoping for an external answer to an internal question. How do you redirect without making them feel dismissed?"},
      divorce:{vibe:"💛 Fear Surfacing",score:5,note:"The fear broke through — the client needs reassurance more than insight right now.",tip:"This is the fear speaking, not the question. What does this client most need to feel before they can hear anything else?"},
    };
    if(personaId&&personaVibes[personaId])return personaVibes[personaId];
    const diffMap={
      "Light":    {vibe:"💛 Needs More Warmth",score:5,note:"The client is waiting to feel heard before they can open up.",tip:"What would it feel like to slow down one exchange and stay entirely in the feeling — no insight, no guidance, just acknowledgment?"},
      "Light+":   {vibe:"💛 Prediction Pull",score:5,note:"The client is sliding toward a yes/no answer — a sign they feel unmet.",tip:"The client is asking for a prediction because they don't feel held yet. What needs to happen before the insight lands?"},
      "Middle":   {vibe:"🟠 Resistance Rising",score:4,note:"The client is testing whether you'll hold the frame or give in.",tip:"Resistance is information. What is the client protecting right now — and how might you name that gently?"},
      "High":     {vibe:"🔴 Needs Rational Re-entry",score:3,note:"The client pulled back — a more grounded, concrete approach is the only door back in.",tip:"Don't defend the framework. Try dropping it entirely: 'Fair enough — what's the thing that logic alone hasn't been able to solve for you?'"},
      "Difficult":{vibe:"🟠 Circling the Wound",score:4,note:"The client came back to the same place — the pain is still unprocessed.",tip:"How do you acknowledge that they've returned to this without making them feel stuck? The return itself is information."},
      "Extreme":  {vibe:"🔴 Seeking Safety",score:3,note:"The client is asking for certainty because uncertainty feels dangerous right now.",tip:"What does genuine care look like when someone is asking you to reassure them with something you can't know?"},
    };
    return diffMap[difficulty.id]||diffMap["Middle"];
  }
  const map={
    empathy:     {vibe:"💚 Emotionally Present",score:9, note:"You led with acknowledgment — this creates the safety that makes everything else land.",tip:"The client felt heard. Now notice: are they still in acute pain, or beginning to open slightly? Your next move depends entirely on that."},
    reframe:     {vibe:"💚 Empowerment Reframe",score:10,note:"You shifted from 'what happened to me' to 'what can I understand' — that's the core of coaching.",tip:"The client received the reframe. Did they accept it, resist it, or go quiet? Each response tells you exactly what to do next."},
    logic:       {vibe:"💚 Rational Bridge",score:9, note:"You met the skeptic in their own language — that's advanced communication skill.",tip:"The skeptic opened a door. What's your next move — do you walk through it immediately, or let them set the pace?"},
    forward:     {vibe:"💚 Empowered Closure",score:10,note:"The client is asking for action — they've moved from passive observer to active participant.",tip:"The action you offer should be about them, not the other person. Something small, immediate, entirely within their control."},
    boundary:    {vibe:"💚 Ethical Leadership",score:10,note:"Holding the line with warmth is one of the hardest and most respected things an advisor can do.",tip:"How do you affirm that this boundary is an act of care, not distance — so the client feels supported rather than redirected?"},
    presence:    {vibe:"💚 True Presence",score:10,note:"You offered pure witnessing before any insight — exactly what this client needed.",tip:"No cards needed here. What is the risk if you try to move too fast in the next exchange?"},
    card:        {vibe:"💚 Spiritual Grounding",score:9, note:"You introduced a tool at the right moment — the client had already opened enough to receive it.",tip:"How you frame the card matters more than which card you chose. Are you presenting it as insight to act on, or as something happening to them?"},
    forward_miss:{vibe:"💛 Too Fast Forward",score:5,note:"The client wasn't ready for action yet — the emotion still needed space.",tip:"What would one more exchange of pure presence before forward motion have given this client?"},
    predict_push:{vibe:"💛 Prediction Invite",score:5,note:"Introducing cards when the client is in prediction-seeking mode can deepen the loop.",tip:"Before reaching for a card, what does this client need to feel first — and how might you name that for them?"},
    missed:      {vibe:"💛 Needs Deeper Connection",score:5,note:"The client is still waiting to feel genuinely seen.",tip:"Before any technique, ask yourself: does this person feel truly witnessed right now? If there's any doubt, go back to pure presence."},
  };
  return map[trigger]||map.missed;
}

function SimulatorScreen({onBack}){
  const [persona,setPersona]=useState(null);
  const [difficulty,setDifficulty]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);
  const [done,setDone]=useState(false);
  const [expandFb,setExpandFb]=useState({});
  const [showTips,setShowTips]=useState(true);
  const [sessionLog,setSessionLog]=useState([]);
  const [arcIndex,setArcIndex]=useState(0);
  const [turnIndex,setTurnIndex]=useState(0);
  const [fallbackCounts,setFallbackCounts]=useState({push:0,empathy:0});
  const bottomRef=useRef(null);
  const nid=useRef(1);

  useEffect(()=>{bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  function startSession(diffId,pers){
    const p=pers||PERSONAS[Math.floor(Math.random()*PERSONAS.length)];
    const d=DIFF_LEVELS.find(x=>x.id===diffId)||DIFF_LEVELS[2];
    setPersona(p);setDifficulty(d);
    setMsgs([{role:"client",text:p.opening,id:nid.current++,feedback:null}]);
    setInput("");setTyping(false);setDone(false);setExpandFb({});setSessionLog([]);setArcIndex(0);setTurnIndex(0);setFallbackCounts({push:0,empathy:0});
  }

  function send(text){
    if(!text.trim()||typing||done||!persona)return;
    const advisorText=text.trim();
    setMsgs(p=>[...p,{role:"expert",text:advisorText,id:nid.current++}]);
    setInput("");setTyping(true);
    setTimeout(()=>{
      const res=getClientReply(persona,difficulty,advisorText,turnIndex,arcIndex,fallbackCounts);
      const safeReply=(res.reply&&res.reply.trim())?res.reply:"Thank you. That actually resonated. I feel like I can breathe a little more now.";
      const newArcIdx=res.advanced?arcIndex+1:arcIndex;
      const newTurn=turnIndex+1;
      if(res.fallbackType)setFallbackCounts(f=>({...f,[res.fallbackType]:(f[res.fallbackType]||0)+1}));
      setMsgs(p=>[...p,{role:"client",text:safeReply,id:nid.current++,feedback:res.vibe}]);
      setSessionLog(l=>[...l,{advisor:advisorText,vibe:res.vibe,advanced:res.advanced,turn:newTurn}]);
      setArcIndex(newArcIdx);
      setTurnIndex(newTurn);
      // No auto-end — session ends only when user clicks End
      setTyping(false);
    },900+Math.random()*700);
  }

  const progress=persona?Math.min(100,Math.round((arcIndex/persona.arc.length)*100)):0;
  const maxArcForDisplay=persona?persona.arc.length:8;

  /* SELECT */
  if(!persona||!difficulty)return(
    <div className="fade-in" style={{width:"100%",maxWidth:"700px",zIndex:10}}>
      <TopBar title="🎭 Client Simulator" sub="Unique AI client for every session" onBack={onBack}/>
      <div style={{background:"rgba(13,8,32,.75)",backdropFilter:"blur(20px)",border:"1px solid rgba(180,130,255,.2)",borderTop:"none",borderRadius:"0 0 24px 24px",padding:"20px",maxHeight:"78vh",overflowY:"auto"}}>
        <div style={{fontSize:".74rem",fontWeight:700,color:"rgba(212,184,255,.5)",letterSpacing:".07em",marginBottom:"10px"}}>CHOOSE DIFFICULTY</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"8px",marginBottom:"20px"}}>
          {DIFF_LEVELS.map(d=>(
            <div key={d.id} className="diff-card" onClick={()=>startSession(d.id)}
              style={{background:"rgba(255,255,255,.04)",border:"1px solid "+d.color+"44",borderRadius:"14px",padding:"14px 10px",textAlign:"center"}}>
              <div style={{fontSize:"1.6rem",marginBottom:"6px"}}>{d.emoji}</div>
              <div style={{fontWeight:700,fontSize:".85rem",color:"#f0ecff",marginBottom:"3px"}}>{d.id}</div>
              <div style={{fontSize:".68rem",color:"rgba(212,184,255,.45)",lineHeight:1.4}}>{d.desc}</div>
            </div>
          ))}
          <div className="diff-card" onClick={()=>startSession(DIFF_LEVELS[Math.floor(Math.random()*DIFF_LEVELS.length)].id)}
            style={{background:"linear-gradient(135deg,rgba(155,89,255,.12),rgba(192,132,252,.08))",border:"1px solid rgba(192,132,252,.35)",borderRadius:"14px",padding:"14px 10px",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100px"}}>
            <div style={{fontSize:"1.6rem",marginBottom:"6px"}}>🎲</div>
            <div style={{fontWeight:700,fontSize:".85rem",color:"#e2c9ff",marginBottom:"3px"}}>Surprise Me</div>
            <div style={{fontSize:".68rem",color:"rgba(212,184,255,.45)",lineHeight:1.4}}>Random difficulty + persona</div>
          </div>
        </div>
        <div style={{fontSize:".74rem",fontWeight:700,color:"rgba(212,184,255,.5)",letterSpacing:".07em",marginBottom:"10px"}}>OR CHOOSE A CLIENT TYPE</div>
        <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
          {PERSONAS.map(p=>(
            <div key={p.id} className="diff-card" onClick={()=>startSession("Middle",p)}
              style={{background:"rgba(255,255,255,.04)",borderRadius:"12px",padding:"12px 16px",display:"flex",gap:"12px",alignItems:"center"}}>
              <span style={{fontSize:"1.4rem",flexShrink:0}}>{p.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:".85rem",color:"#f0ecff"}}>{p.name}</div>
                <div style={{fontSize:".72rem",color:"rgba(212,184,255,.5)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.situation}</div>
              </div>
              <span style={{fontSize:".7rem",color:"rgba(180,130,255,.4)"}}>›</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  /* ANALYSIS */
  if(done){
    const total=sessionLog.length;
    const avg=total?Math.round(sessionLog.reduce((s,l)=>s+(l.vibe.score||5),0)/total):5;
    const advanced=sessionLog.filter(l=>l.advanced).length;
    const arcCompleted=arcIndex>=persona.arc.length;
    const grade=avg>=9?'S':avg>=8?'A':avg>=7?'B':avg>=5?'C':'D';
    const gc=avg>=8?'#4ade80':avg>=6?'#fbbf24':'#f87171';
    const pros=[],cons=[],recs=[];
    if(avg>=8)pros.push("Consistently high-quality responses — genuine emotional intelligence throughout.");
    if(advanced>1)pros.push("Advanced the client's arc "+advanced+" out of "+total+" exchanges — real attunement to their emotional state.");
    if(arcCompleted)pros.push("Full arc completed — you guided the client from their opening wound all the way through to insight and forward motion.");
    if(sessionLog.some(l=>l.advisor.match(/hear|understand|valid|sounds like|must be|of course|natural/i)))pros.push("Effective validation language — the client felt genuinely heard.");
    if(sessionLog.some(l=>l.advisor.length>80))pros.push("Thoughtful, detailed responses — you resisted the pull toward quick fixes.");
    if(!pros.length)pros.push("You stayed present and engaged — that is always the foundation.");
    if(avg<7)cons.push("Average score of "+avg+"/10 — insights may have been offered before enough emotional presence was established.");
    if(advanced<Math.ceil(total*0.5)&&total>2)cons.push("Only "+advanced+" of "+total+" exchanges advanced the arc. The client needed more consistent empathy and pacing to open up.");
    if(sessionLog.some(l=>l.advisor.length<20))cons.push("Some responses were very brief — short replies can feel dismissive during emotionally charged moments.");
    if(!sessionLog.some(l=>l.advisor.match(/feel|emotion|heart|hear|sense|pain|difficult|hard|imagine|must be|sounds like/i)))cons.push("Limited emotional language — feeling-words help clients feel truly seen, not just analyzed.");
    if(!cons.length)cons.push("No critical gaps — try a higher difficulty level for more challenge.");
    recs.push("For "+difficulty.id+" level ("+persona.situation+"): pacing is everything. Stay in the feeling before any reframe or tool.");
    recs.push("Practise the Validation-First Rule: acknowledge the emotion completely before offering any insight, card, or direction.");
    if(!arcCompleted&&total>3)recs.push("You reached step "+arcIndex+" of "+persona.arc.length+" in the arc. Try this persona again and focus on matching the client's exact emotional language before offering direction.");
    if(avg>=8)recs.push("High-level performance. Your next edge: notice how quickly you transition from presence to insight. Try staying one full beat longer in pure witnessing.");
    else recs.push("Before your next session: re-read the client's opening message. What's the emotional undertone beneath the stated question? That's where the real session lives.");
    return(
      <div className="fade-in" style={{width:"100%",maxWidth:"680px",zIndex:10}}>
        <TopBar title="📊 Session Analysis" sub={persona.emoji+" "+persona.name+" · "+difficulty.id} onBack={()=>{setPersona(null);setDifficulty(null);setDone(false);}} backLabel="← New Session"/>
        <div style={{background:"rgba(13,8,32,.75)",backdropFilter:"blur(20px)",border:"1px solid rgba(180,130,255,.2)",borderTop:"none",borderRadius:"0 0 24px 24px",padding:"20px",maxHeight:"580px",overflowY:"auto"}}>
          <div style={{textAlign:"center",marginBottom:"18px",padding:"18px",background:"rgba(155,89,255,.09)",border:"1px solid rgba(180,130,255,.18)",borderRadius:"16px"}}>

              {[{l:"Exchanges",v:total},{l:"Arc Advanced",v:advanced},{l:"Avg Score",v:avg+"/10"}].map((s,i)=>(
                <div key={i} style={{textAlign:"center"}}>
                  <div style={{fontSize:"1.3rem",fontWeight:800,color:"#c084fc"}}>{s.v}</div>
                  <div style={{fontSize:".66rem",color:"rgba(212,184,255,.4)",fontWeight:600,letterSpacing:".04em"}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
          {[{label:"✅ WHAT YOU DID WELL",items:pros,bg:"rgba(74,222,128,.07)",bc:"rgba(74,222,128,.2)",tc:"rgba(212,244,212,.85)",hc:"#4ade80"},
            {label:"⚠️ AREAS FOR GROWTH",items:cons,bg:"rgba(248,113,113,.07)",bc:"rgba(248,113,113,.2)",tc:"rgba(255,200,200,.85)",hc:"#f87171"},
            {label:"🧭 STRATEGIC RECOMMENDATIONS",items:recs,bg:"rgba(155,89,255,.08)",bc:"rgba(180,130,255,.22)",tc:"rgba(228,215,255,.85)",hc:"#c084fc"},
          ].map(function(sec){return(
            <div key={sec.label} style={{marginBottom:"14px"}}>
              <div style={{fontSize:".74rem",fontWeight:700,color:sec.hc,marginBottom:"7px",letterSpacing:".05em"}}>{sec.label}</div>
              {sec.items.map((item,i)=><div key={i} style={{background:sec.bg,border:"1px solid "+sec.bc,borderRadius:"10px",padding:"9px 13px",marginBottom:"7px",fontSize:".8rem",color:sec.tc,lineHeight:1.55}}>{item}</div>)}
            </div>
          );})}
          <div style={{marginBottom:"14px"}}>
            <div style={{fontSize:".74rem",fontWeight:700,color:"rgba(212,184,255,.4)",marginBottom:"7px",letterSpacing:".05em"}}>📋 EXCHANGE LOG</div>
            {sessionLog.map((l,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(180,130,255,.1)",borderRadius:"10px",padding:"9px 12px",marginBottom:"7px"}}>
                <div style={{fontSize:".7rem",color:"rgba(212,184,255,.35)",marginBottom:"3px"}}>Exchange {i+1}</div>
                <div style={{fontSize:".78rem",color:"rgba(212,184,255,.6)",borderLeft:"2px solid rgba(99,102,241,.35)",paddingLeft:"8px",marginBottom:"4px",fontStyle:"italic"}}>You: "{l.advisor.slice(0,80)}{l.advisor.length>80?'…':''}"</div>
                <span style={{fontSize:".74rem",fontWeight:600,color:l.vibe.score>=8?'#86efac':l.vibe.score>=5?'#fcd34d':'#fca5a5'}}>{l.vibe.vibe}</span>
                <span style={{fontSize:".68rem",color:"rgba(212,184,255,.35)",marginLeft:"6px"}}>({l.vibe.score}/10)</span>

            ))}
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <button className="btn-g" onClick={()=>{setPersona(null);setDifficulty(null);setDone(false);}} style={{flex:1,background:"rgba(255,255,255,.06)",border:"1px solid rgba(180,130,255,.2)",color:"rgba(212,184,255,.6)",borderRadius:"12px",padding:"10px",fontSize:".82rem",cursor:"pointer",fontWeight:600}}>← New Session</button>
            <button className="btn-p" onClick={onBack} style={{flex:1,background:"linear-gradient(135deg,#9b59ff,#c084fc)",border:"none",color:"white",padding:"10px",borderRadius:"12px",cursor:"pointer",fontSize:".82rem",fontWeight:700}}>Home</button>
          </div>
        </div>
      </div>
    );
  }

  /* ACTIVE CHAT */
  return(
    <div className="fade-in" style={{width:"100%",maxWidth:"680px",zIndex:10,display:"flex",flexDirection:"column",height:"92vh",maxHeight:"740px"}}>
      <div style={{background:"rgba(13,8,32,.85)",backdropFilter:"blur(20px)",border:"1px solid rgba(180,130,255,.2)",borderBottom:"none",borderRadius:"24px 24px 0 0",padding:"12px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
          <button className="btn-g" onClick={()=>{setPersona(null);setDifficulty(null);}} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(180,130,255,.2)",color:"rgba(212,184,255,.55)",borderRadius:"10px",padding:"5px 12px",fontSize:".76rem",cursor:"pointer"}}>← Levels</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontWeight:700,color:"#f0ecff",fontSize:".9rem"}}>{persona.emoji} {persona.name}</div>
            <div style={{fontSize:".7rem",color:"rgba(212,184,255,.5)"}}>{difficulty.id} · {persona.situation}</div>
          </div>
          <div style={{display:"flex",gap:"5px"}}>
            <button className="btn-g" onClick={()=>startSession(difficulty.id,persona)} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(180,130,255,.2)",color:"rgba(212,184,255,.55)",borderRadius:"10px",padding:"5px 10px",fontSize:".72rem",cursor:"pointer"}}>🔄</button>
            <button onClick={()=>setDone(true)} style={{background:"rgba(248,113,113,.12)",border:"1px solid rgba(248,113,113,.35)",color:"rgba(252,165,165,.85)",borderRadius:"10px",padding:"5px 10px",fontSize:".72rem",cursor:"pointer",fontWeight:600}}>End</button>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
          <div style={{flex:1,height:"4px",background:"rgba(255,255,255,.07)",borderRadius:"10px",overflow:"hidden"}}>
            <div style={{width:progress+"%",height:"100%",background:"linear-gradient(90deg,"+difficulty.color+",#c084fc)",borderRadius:"10px",transition:"width .5s ease"}}/>
          </div>
          <span style={{fontSize:".68rem",color:difficulty.color,fontWeight:700,flexShrink:0}}>{difficulty.id}</span>
          <span style={{fontSize:".68rem",color:"rgba(212,184,255,.4)",flexShrink:0}}>Turn {turnIndex+1}</span>
        </div>
        <button onClick={()=>setShowTips(t=>!t)} style={{width:"100%",padding:"9px 16px",borderRadius:"12px",border:"none",cursor:"pointer",background:showTips?"linear-gradient(135deg,rgba(251,191,36,.18),rgba(251,191,36,.08))":"rgba(255,255,255,.05)",borderWidth:"1px",borderStyle:"solid",borderColor:showTips?"rgba(251,191,36,.45)":"rgba(180,130,255,.2)",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .25s"}}>
          <span style={{fontSize:".8rem",fontWeight:600,color:showTips?"#fde68a":"rgba(212,184,255,.5)"}}>💡 Mentor Feedback</span>
          <span style={{fontSize:".7rem",fontWeight:700,padding:"3px 10px",borderRadius:"20px",background:showTips?"rgba(251,191,36,.25)":"rgba(255,255,255,.08)",color:showTips?"#fbbf24":"rgba(212,184,255,.4)",letterSpacing:".06em"}}>{showTips?"ON":"OFF"}</span>
        </button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"16px",display:"flex",flexDirection:"column",gap:"12px",background:"rgba(13,8,32,.6)",backdropFilter:"blur(16px)",border:"1px solid rgba(180,130,255,.2)",borderTop:"none",borderBottom:"none"}}>
        <div style={{display:"flex",gap:"16px",padding:"6px 10px",background:"rgba(255,255,255,.03)",borderRadius:"8px",fontSize:".7rem",color:"rgba(212,184,255,.5)"}}>
          <span><span style={{color:persona.color}}>●</span> {persona.name}</span>
          <span><span style={{color:"#93c5fd"}}>●</span> You (Expert)</span>
          {showTips&&<span><span style={{color:"#fbbf24"}}>●</span> Mentor</span>}
        </div>
        {msgs.map((m,mi)=>(
          <div key={m.id} className="slide-in">
            {m.role==="client"&&(
              <div>
                <div style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
                  <div style={{width:"32px",height:"32px",borderRadius:"50%",background:persona.color+"33",border:"1px solid "+persona.color+"66",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",flexShrink:0,marginTop:"2px"}}>{persona.emoji}</div>
                  <div style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.09)",borderRadius:"4px 16px 16px 16px",padding:"11px 15px",fontSize:".875rem",lineHeight:1.65,color:"#f0ecff",maxWidth:"78%"}}>{m.text}</div>
                </div>
                {showTips&&m.feedback&&(
                  <div style={{marginLeft:"42px",marginTop:"8px"}}>
                    <button onClick={()=>setExpandFb(p=>({...p,[mi]:!p[mi]}))} style={{background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.28)",borderRadius:"10px",padding:"7px 14px",fontSize:".76rem",color:"#fde68a",cursor:"pointer",width:"100%",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span>💡 {m.feedback.vibe} &nbsp;<strong style={{color:"#fbbf24"}}>({m.feedback.score}/10)</strong></span>
                      <span style={{fontSize:".65rem"}}>{expandFb[mi]?"▲ hide":"▼ show"}</span>
                    </button>
                    {expandFb[mi]&&(
                      <div className="pop" style={{background:"rgba(251,191,36,.06)",border:"1px solid rgba(251,191,36,.22)",borderRadius:"0 0 12px 12px",padding:"12px 14px",fontSize:".8rem",lineHeight:1.6}}>
                        <div style={{marginBottom:"8px",color:"#fde68a"}}><strong>Vibe Note:</strong> {m.feedback.note}</div>
                        <div style={{color:"rgba(253,230,138,.8)"}}><strong>Expert Tip:</strong> {m.feedback.tip}</div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
            {m.role==="expert"&&(
              <div style={{display:"flex",justifyContent:"flex-end"}}>
                <div style={{maxWidth:"76%",background:"linear-gradient(135deg,rgba(99,102,241,.42),rgba(139,92,246,.38))",border:"1px solid rgba(139,92,246,.32)",borderRadius:"16px 4px 16px 16px",padding:"10px 15px",fontSize:".875rem",lineHeight:1.65,color:"#f0ecff"}}>{m.text}</div>
              </div>
            )}
          </div>
        ))}
        {typing&&(
          <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
            <div style={{width:"32px",height:"32px",borderRadius:"50%",background:persona.color+"33",border:"1px solid "+persona.color+"66",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px"}}>{persona.emoji}</div>
            <div style={{padding:"11px 16px",borderRadius:"4px 16px 16px 16px",background:"rgba(255,255,255,.06)",display:"flex",gap:"5px",alignItems:"center"}}>
              {[0,1,2].map(i=><div key={i} style={{width:"6px",height:"6px",borderRadius:"50%",background:persona.color,animation:"dot 1.2s ease-in-out "+(i*.2)+"s infinite"}}/>)}
            </div>
          </div>
        )}
        {done&&(
          <div className="pop" style={{textAlign:"center",padding:"20px",background:"rgba(155,89,255,.1)",border:"1px solid rgba(192,132,252,.28)",borderRadius:"16px"}}>
            <div style={{fontSize:"2.2rem",marginBottom:"8px"}}>🌟</div>
            <div style={{fontWeight:700,color:"#e2c9ff",marginBottom:"4px"}}>Session Complete</div>
            <div style={{fontSize:".8rem",color:"rgba(212,184,255,.6)",marginBottom:"14px"}}>Review your feedback above, then see your full analysis.</div>
            <button className="btn-p" onClick={()=>setDone(true)} style={{background:"linear-gradient(135deg,#9b59ff,#c084fc)",border:"none",color:"white",padding:"9px 22px",borderRadius:"12px",cursor:"pointer",fontSize:".82rem",fontWeight:600}}>View Full Analysis →</button>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      {!done&&<ChatInput value={input} onChange={setInput} onSend={send} disabled={typing} placeholder={"Respond to "+persona.name+"…"}/>}
    </div>
  );
}

/* ══════════════════════════════════════
   APP ROOT
══════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState("home");
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0d0820 0%,#1a0e3a 45%,#0d1a2e 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px",position:"relative",overflow:"hidden"}}>
      {STARS.map(s=>(
        <div key={s.id} style={{position:"fixed",top:s.top+"%",left:s.left+"%",width:s.size+"px",height:s.size+"px",borderRadius:"50%",background:"white",opacity:s.op,animation:"twinkle "+s.dur+"s ease-in-out infinite alternate",pointerEvents:"none"}}/>
      ))}
      {screen==="home"&&<HomeScreen onSelect={setScreen}/>}
      {screen==="kb"&&<KBScreen onBack={()=>setScreen("home")}/>}
      {screen==="sim"&&<SimulatorScreen onBack={()=>setScreen("home")}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
